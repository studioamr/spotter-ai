<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPOTTER AI — AI Trading Assistant</title>
<meta name="description" content="SPOTTER AI is the AI trading assistant that keeps prop traders disciplined: one bullet a session, a live blow-up guard for your firm's rules, and a journal that turns every trade into an edge.">
<meta name="theme-color" content="#0A0A0B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SPOTTER AI">
<meta property="og:type" content="website">
<meta property="og:title" content="SPOTTER AI — AI Trading Assistant">
<meta property="og:description" content="One bullet a session. A live blow-up guard for your prop-firm rules. The AI assistant that keeps you disciplined all the way to payout.">
<meta property="og:image" content="assets/icon_512.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="SPOTTER AI — AI Trading Assistant">
<meta name="twitter:description" content="One bullet a session. A live blow-up guard for your prop-firm rules. Discipline, all the way to payout.">
<meta name="twitter:image" content="assets/icon_512.png">
<link rel="manifest" href="manifest.json">
<script>
  if("serviceWorker" in navigator) addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
  window.__pwa=null;
  addEventListener("beforeinstallprompt",e=>{e.preventDefault();window.__pwa=e;document.documentElement.classList.add("can-install");});
  addEventListener("appinstalled",()=>{document.documentElement.classList.remove("can-install");window.__pwa=null;});
</script>
<link rel="icon" type="image/png" href="assets/icon_192.png">
<link rel="apple-touch-icon" href="assets/icon_192.png">
<style>
  :root{
    --bg:#0A0A0B; --bg1:#0F0F11; --ink:#F4F1EA;
    --ink1:rgba(244,241,234,.55); --ink2:rgba(244,241,234,.30);
    --line:rgba(244,241,234,.14); --accent:#3d86cf; --accent2:#5B9BD5; --rojo:#d6493f;
    --serif:"Hoefler Text",Georgia,"Times New Roman",serif;
    --sans:"Inter Tight","Helvetica Neue",-apple-system,system-ui,sans-serif;
    --ease:cubic-bezier(.19,1,.22,1);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:var(--sans); background:var(--bg); color:var(--ink);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    overflow-x:hidden; overflow-y:auto;
    transition:background .6s var(--ease), color .6s var(--ease);
  }
  @media(pointer:coarse){body{cursor:auto}}
  ::selection{background:var(--accent);color:#0A0A0B}
  /* no visible scrollbars anywhere — scrolling still works */
  *{scrollbar-width:none;-ms-overflow-style:none}
  *::-webkit-scrollbar{display:none;width:0;height:0}
  /* ===== NorthPoint-style shell (sidebar + topbar + content) ===== */
  .sidebar{position:fixed;top:0;left:0;bottom:0;width:232px;z-index:30;display:flex;flex-direction:column;
    background:rgba(10,10,11,.72);backdrop-filter:blur(12px);border-right:1px solid var(--line);padding:22px 15px}
  .trial-badge{margin:-8px 10px 12px;font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);border:1px solid rgba(61,134,207,.35);background:rgba(61,134,207,.08);border-radius:6px;padding:5px 9px;text-align:center}
  .pwa-install{position:fixed;right:18px;bottom:18px;z-index:60;display:none;align-items:center;gap:8px;
    font-family:var(--sans);font-size:13px;font-weight:600;letter-spacing:.02em;color:#0A0A0B;
    background:var(--ink);border:none;border-radius:999px;padding:12px 20px;cursor:pointer;
    box-shadow:0 12px 30px rgba(0,0,0,.5);transition:transform .2s}
  .pwa-install:hover{transform:translateY(-2px)}
  html.can-install .pwa-install{display:inline-flex}
  .sb-brand{display:flex;align-items:center;gap:11px;font-family:var(--sans);font-size:12.5px;letter-spacing:.22em;font-weight:600;padding:6px 8px 20px}
  .sb-brand i{color:var(--accent);font-style:normal}
  .brand-mark{width:26px;height:26px;flex:none;display:block;color:var(--ink);overflow:visible}
  .brand-mark .spin{transform-origin:16px 16px;animation:markSpin 24s linear infinite}
  .brand-mark .lock{transform-origin:16px 16px;animation:markPulse 3.4s ease-in-out infinite}
  @keyframes markSpin{to{transform:rotate(360deg)}}
  @keyframes markPulse{0%,100%{opacity:.75;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
  @media(prefers-reduced-motion:reduce){.brand-mark .spin,.brand-mark .lock{animation:none}}
  .sb-profile{display:flex;align-items:center;gap:11px;width:100%;background:none;border:1px solid var(--line);border-radius:12px;padding:9px 11px;margin-bottom:14px;cursor:pointer;text-align:left;transition:border-color .2s}
  .sb-profile:hover{border-color:var(--ink2)}
  .tb-av{width:34px;height:34px;border-radius:50%;flex:none;display:grid;place-items:center;font-family:var(--serif);font-size:1rem;color:var(--ink);border:1px solid var(--line);background:radial-gradient(120% 120% at 30% 20%,rgba(61,134,207,.35),rgba(15,15,17,.6))}
  .sb-pinfo{display:flex;flex-direction:column;overflow:hidden}
  .sb-pinfo b{font-size:.9rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sb-pinfo small{font-size:.66rem;color:var(--ink2)}
  .navlist{display:flex;flex-direction:column;gap:1px;flex:1;overflow-y:auto;margin:0 -3px}
  .nav-group{font-size:.55rem;text-transform:uppercase;letter-spacing:.2em;color:var(--ink2);padding:15px 12px 7px}
  .navitem{display:flex;align-items:center;gap:10px;width:100%;background:none;border:none;border-radius:9px;padding:9px 13px;color:var(--ink1);font-family:var(--sans);font-size:.9rem;cursor:pointer;text-align:left;transition:background .2s,color .2s;text-decoration:none}
  .navitem:hover{background:rgba(244,241,234,.05);color:var(--ink)}
  .navitem.on{background:rgba(61,134,207,.13);color:var(--ink)}
  .nav-badge{margin-left:auto;font-size:.6rem;color:var(--accent);font-variant-numeric:tabular-nums}
  .sb-foot{border-top:1px solid var(--line);padding-top:8px;margin-top:8px}
  .shell{margin-left:232px;min-height:100vh;display:flex;flex-direction:column}
  .topbar{position:sticky;top:0;z-index:15;display:flex;justify-content:space-between;align-items:center;
    padding:13px 30px;border-bottom:1px solid var(--line);background:rgba(10,10,11,.65);backdrop-filter:blur(10px)}
  .topbar .tb-menu{display:none;background:none;border:none;color:var(--ink1);font-size:1.2rem;cursor:pointer}
  .tb-right{display:flex;align-items:center}
  .mkt{font-size:.7rem;color:var(--ink1);letter-spacing:.06em;display:inline-flex;align-items:center;gap:7px}
  .mkt i{width:7px;height:7px;border-radius:50%;background:#35c46f;box-shadow:0 0 8px #35c46f}
  .mkt.closed i{background:var(--ink2);box-shadow:none}
  #clock{font-family:var(--sans);font-size:.72rem;color:var(--ink2);font-variant-numeric:tabular-nums;letter-spacing:.05em;margin-left:16px}
  #panel.content{padding:clamp(24px,4vw,44px);flex:1;width:100%;max-width:1200px;display:block}
  @media(max-width:860px){
    .sidebar{transform:translateX(-100%);transition:transform .3s var(--ease);width:250px}
    .sidebar.open{transform:none}
    .shell{margin-left:0}
    .topbar .tb-menu{display:block}
  }
  /* Rutina */
  .rutina{display:flex;flex-direction:column;gap:18px}
  .rutina-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media(max-width:720px){.rutina-grid{grid-template-columns:1fr}}
  .chk-list{display:flex;flex-direction:column}
  .chk{display:flex;align-items:center;gap:13px;width:100%;background:none;border:none;border-top:1px solid var(--line);padding:14px 4px;color:var(--ink1);font-family:var(--sans);font-size:.94rem;cursor:pointer;text-align:left}
  .chk:first-child{border-top:none}
  .chk-box{width:19px;height:19px;border-radius:6px;border:1.5px solid var(--line);flex:none;position:relative;transition:all .2s}
  .chk.on{color:var(--ink)}
  .chk.on .chk-box{background:var(--accent);border-color:var(--accent)}
  .chk.on .chk-box::after{content:"✓";position:absolute;inset:0;display:grid;place-items:center;color:#0A0A0B;font-size:.72rem;font-weight:700}
  .rules4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  @media(max-width:640px){.rules4{grid-template-columns:1fr 1fr}}
  .r4{border:1px solid var(--line);border-radius:12px;padding:16px;text-align:center}
  .r4 b{font-family:var(--serif);font-size:1.8rem;display:block;color:var(--accent);line-height:1}
  .r4 span{font-size:.72rem;color:var(--ink2);margin-top:9px;display:block;line-height:1.35}
  /* Accounts */
  .acct-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:18px}
  @media(max-width:720px){.acct-grid{grid-template-columns:1fr}}
  .acct-card{display:flex;flex-direction:column;gap:14px;position:relative}
  .ac-x{position:absolute;top:10px;right:12px;background:none;border:none;color:var(--ink2);font-size:1.05rem;line-height:1;cursor:pointer;padding:4px;opacity:0;transition:opacity .2s,color .2s}
  .acct-card:hover .ac-x{opacity:1}
  .ac-x:hover{color:var(--rojo)}
  .ac-head{display:flex;align-items:center;gap:12px}
  .ac-size{font-size:.72rem;color:var(--ink2);margin-top:2px}
  .ac-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;border-top:1px solid var(--line);padding-top:13px}
  .ac-stats span{font-size:.56rem;text-transform:uppercase;letter-spacing:.1em;color:var(--ink2);display:block;margin-bottom:5px}
  .ac-stats b{font-size:1.05rem;font-variant-numeric:tabular-nums}
  .acct-add{display:grid;place-items:center;color:var(--ink2);font-family:var(--sans);font-size:.9rem;border-style:dashed;cursor:pointer;min-height:130px}
  .acct-add:hover{color:var(--ink);border-color:var(--ink2)}
  /* Rutina · session launcher */
  .btn.lg{padding:14px 26px;font-size:.98rem}
  .sess-ready,.sess-live,.sess-done{display:flex;flex-direction:column;gap:18px}
  .sr-hero,.sd-hero{padding:clamp(28px,5vw,44px);text-align:center;
    background:linear-gradient(180deg,rgba(61,134,207,.08),transparent 70%)}
  .sr-eyebrow{font-size:.6rem;text-transform:uppercase;letter-spacing:.24em;color:var(--accent);margin-bottom:16px}
  .sr-h{font-family:var(--serif);font-weight:400;font-size:clamp(2rem,5vw,3.2rem);letter-spacing:-.02em;line-height:1.05;margin-bottom:16px}
  .sr-h em{font-style:italic;color:var(--accent)}
  .sr-p{color:var(--ink1);font-size:clamp(.95rem,1.5vw,1.1rem);line-height:1.6;max-width:58ch;margin:0 auto 24px}
  .sr-p b{color:var(--ink);font-weight:500}
  .sr-steps{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  @media(max-width:820px){.sr-steps{grid-template-columns:1fr 1fr}}
  @media(max-width:520px){.sr-steps{grid-template-columns:1fr}}
  .sr-step{border:1px solid var(--line);border-radius:12px;background:var(--bg1);padding:18px;display:flex;gap:13px;align-items:flex-start}
  .sr-n{font-family:var(--mono,var(--sans));font-size:.72rem;color:var(--accent);font-variant-numeric:tabular-nums;margin-top:2px}
  .sr-step b{font-size:.94rem;font-weight:600;display:block;margin-bottom:5px}
  .sr-step p{color:var(--ink2);font-size:.8rem;line-height:1.45}
  .sl-top{display:flex;justify-content:space-between;align-items:center}
  .sl-status{font-size:.86rem;color:var(--ink1);display:flex;align-items:center;gap:10px}
  .sl-status b{color:var(--ink);font-weight:600}
  .sl-dot{width:9px;height:9px;border-radius:50%;background:#35c46f;box-shadow:0 0 0 0 rgba(53,196,111,.5);animation:slpulse 1.6s infinite}
  @keyframes slpulse{0%{box-shadow:0 0 0 0 rgba(53,196,111,.45)}70%{box-shadow:0 0 0 9px rgba(53,196,111,0)}100%{box-shadow:0 0 0 0 rgba(53,196,111,0)}}
  .sl-time{font-family:var(--serif);font-size:1.4rem;color:var(--ink);font-variant-numeric:tabular-nums}
  .sess-flow{display:flex;flex-direction:column;gap:10px}
  .sf-step{display:flex;align-items:center;gap:15px;width:100%;text-align:left;border:1px solid var(--line);border-radius:12px;background:var(--bg1);padding:18px 20px;cursor:pointer;transition:border-color .2s,background .2s}
  .sf-step .sf-n{font-family:var(--serif);font-size:1.1rem;color:var(--ink2);flex:none;width:26px}
  .sf-b{flex:1}
  .sf-b b{font-size:1rem;font-weight:600;display:block;margin-bottom:3px}
  .sf-b p{color:var(--ink2);font-size:.82rem;line-height:1.4}
  .sf-mark{font-size:.64rem;text-transform:uppercase;letter-spacing:.12em;color:var(--ink2);border:1px solid var(--line);border-radius:6px;padding:6px 10px;white-space:nowrap}
  .sf-step.now{border-color:var(--accent)}
  .sf-step.now .sf-n{color:var(--accent)}
  .sf-step.done{opacity:.62}
  .sf-step.done .sf-mark{color:#35c46f;border-color:#35c46f}
  .sf-step.trading{cursor:default;background:linear-gradient(180deg,rgba(61,134,207,.07),transparent)}
  .sf-live{font-size:.6rem;text-transform:uppercase;letter-spacing:.16em;color:#35c46f;border:1px solid #35c46f;border-radius:999px;padding:5px 11px;white-space:nowrap}
  .sl-actions{display:flex;gap:12px;flex-wrap:wrap}
  /* session phases */
  .ses-rules{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  @media(max-width:720px){.ses-rules{grid-template-columns:1fr 1fr}}
  .sr-rule{border:1px solid var(--line);border-radius:12px;padding:16px;text-align:center}
  .sr-rule span{font-size:.6rem;text-transform:uppercase;letter-spacing:.14em;color:var(--ink2);display:block;margin-bottom:9px}
  .sr-rule b{font-family:var(--serif);font-size:1.7rem;font-weight:400;line-height:1}
  .ses-grid{display:grid;grid-template-columns:1.5fr 1fr;gap:18px}
  @media(max-width:820px){.ses-grid{grid-template-columns:1fr}}
  .ses-main{display:flex;flex-direction:column;gap:16px}
  .btn.fire{border-color:var(--accent);background:var(--accent);color:#0A0A0B;font-size:1.05rem;align-self:flex-start}
  .btn.fire:hover{filter:brightness(1.12)}
  .ses-checks{display:flex;gap:14px;flex-wrap:wrap;font-size:.72rem;color:#35c46f;letter-spacing:.04em}
  .ses-checks .wait{color:var(--ink2)}
  .ses-ul{list-style:none;display:flex;flex-direction:column;gap:9px}
  .ses-ul li{font-size:.88rem;color:var(--ink1);padding-left:16px;position:relative;line-height:1.45}
  .ses-ul li::before{content:"→";position:absolute;left:0;color:var(--accent)}
  .ses-ul li b{color:var(--ink)}
  .ses-seal{display:flex;gap:14px;flex-wrap:wrap}
  .ses-seal .btn{min-width:150px;justify-content:center;font-size:1.05rem}
  .sl-dot.fired{background:var(--accent);animation-name:slpulse2}
  @keyframes slpulse2{0%{box-shadow:0 0 0 0 rgba(61,134,207,.5)}70%{box-shadow:0 0 0 9px rgba(61,134,207,0)}100%{box-shadow:0 0 0 0 rgba(61,134,207,0)}}
  .sd-hero.won{background:linear-gradient(180deg,rgba(53,196,111,.1),transparent 70%)}
  .sd-hero.lost{background:linear-gradient(180deg,rgba(214,73,63,.09),transparent 70%)}
  .ses-log{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px}
  .ses-log label{display:flex;flex-direction:column;gap:7px;font-size:.6rem;text-transform:uppercase;letter-spacing:.14em;color:var(--ink2)}
  .ses-log input,.ses-log select{background:#000;border:1px solid var(--line);border-radius:8px;color:var(--ink);font-family:var(--sans);font-size:.94rem;padding:10px 12px;cursor:text;min-width:130px}
  .ses-log input:focus,.ses-log select:focus{outline:none;border-color:var(--accent)}
  /* community */
  .ann-grid{grid-template-columns:repeat(3,1fr)}
  @media(max-width:820px){.ann-grid{grid-template-columns:1fr}}
  .live-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#d6493f;margin-right:4px;animation:slpulse3 1.5s infinite}
  @keyframes slpulse3{0%,100%{opacity:1}50%{opacity:.35}}
  /* training */
  .training{display:flex;flex-direction:column;gap:18px}
  .bt-chart{background:#050507;border:1px solid var(--line);border-radius:12px;overflow:hidden;margin:4px 0 16px}
  .bt-svg{display:block;width:100%;height:auto}
  .bt-controls{display:flex;gap:10px;flex-wrap:wrap}
  .bt-controls .btn[disabled]{opacity:.35;pointer-events:none}
  /* progress */
  .progress2,.plan2,.payouts2,.invest2,.settings2{display:flex;flex-direction:column;gap:18px}
  .race-track.big{height:44px;margin-top:12px}
  .race-track.big .rc-run{width:36px;height:36px;font-size:.78rem}
  .prog-hero .race-zones{margin-top:14px}
  /* plan · 4-phase scaling map */
  .plan-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:820px){.plan-grid{grid-template-columns:1fr}}
  .plan-phase h3{font-family:var(--serif);font-weight:400;font-size:1.4rem;margin:10px 0 14px}
  .plan-phase.now{border-color:var(--accent);background:linear-gradient(180deg,rgba(61,134,207,.07),var(--bg1) 60%)}
  .plan-phase.done{opacity:.6}
  .pp-head{display:flex;justify-content:space-between;align-items:baseline;gap:12px}
  .pp-tag{font-size:.58rem;text-transform:uppercase;letter-spacing:.18em;color:var(--accent)}
  .pp-pay{font-family:var(--serif);font-size:1.15rem;color:var(--ink2);font-variant-numeric:tabular-nums}
  .pp-pay.acc{color:#35c46f}
  .pp-rows{display:flex;flex-direction:column}
  .pp-rows .fr{display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-top:1px solid rgba(244,241,234,.06);font-size:.86rem}
  .pp-rows .fr span{color:var(--ink2);font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;align-self:center}
  .pp-rows .fr b{font-weight:500;font-variant-numeric:tabular-nums;text-align:right}
  .model-card .model-in{display:flex;justify-content:space-between;gap:26px;align-items:center;flex-wrap:wrap}
  .model-h{font-family:var(--serif);font-size:1.25rem;margin-bottom:8px}
  .model-in .home-p{max-width:52ch;margin:0}
  .model-flow{display:flex;align-items:center;gap:10px;flex:none}
  .model-flow span{border:1px solid var(--accent);color:var(--accent);border-radius:999px;padding:8px 16px;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}
  .model-flow em{color:var(--ink2);font-style:normal}
  /* investments */
  .inv-top{display:flex;justify-content:space-between;align-items:flex-end;gap:18px;flex-wrap:wrap}
  .inv-bal{font-family:var(--serif);font-size:clamp(1.9rem,4vw,2.8rem);line-height:1;margin-top:6px;font-variant-numeric:tabular-nums}
  .inv-grid{display:grid;grid-template-columns:auto 1fr;gap:26px;align-items:center}
  @media(max-width:640px){.inv-grid{grid-template-columns:1fr;justify-items:center}}
  .donut{display:block}
  .dotc{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:8px;vertical-align:baseline}
  /* course · NorthPoint layout */
  .course-hero{display:flex;justify-content:space-between;align-items:center;gap:26px;margin-bottom:22px}
  .ch-h{font-family:var(--serif);font-weight:400;font-size:clamp(1.4rem,3vw,2rem);letter-spacing:-.01em;margin:4px 0 16px;max-width:26ch}
  .ch-l .course-prog{margin-bottom:18px;max-width:420px}
  .ch-r{position:relative;flex:none;display:grid;place-items:center}
  .ch-pct{position:absolute;font-family:var(--serif);font-size:1.5rem}
  @media(max-width:720px){.course-hero{flex-direction:column;align-items:flex-start}.ch-r{align-self:center}}
  .lesson-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:18px;align-items:start}
  @media(max-width:860px){.lesson-grid{grid-template-columns:1fr}}
  .les.active{background:rgba(61,134,207,.1);border-radius:8px}
  .video-cap{font-size:.68rem;color:var(--ink2);margin-top:10px;letter-spacing:.04em}
  .lesson-meta{display:flex;gap:12px;align-items:center;margin:18px 0 6px}
  .pill-mod{font-size:.58rem;text-transform:uppercase;letter-spacing:.14em;border:1px solid;border-radius:5px;padding:4px 9px}
  /* training · 1v1 battles */
  .battle-grid{display:grid;grid-template-columns:220px 1fr 1fr;gap:14px;align-items:stretch}
  @media(max-width:900px){.battle-grid{grid-template-columns:1fr}}
  .rank-card{display:flex;flex-direction:column;align-items:center;text-align:center;justify-content:center}
  .rk-elo{font-family:var(--serif);font-size:3rem;line-height:1;margin:10px 0 8px;font-variant-numeric:tabular-nums}
  .rk-sub{font-size:.66rem;text-transform:uppercase;letter-spacing:.14em;color:var(--ink2)}
  .searching{display:flex;align-items:center;gap:10px;font-size:.9rem;color:var(--ink1);margin:6px 0 4px}

  .vid-edit input{flex:1;min-width:220px;background:#000;border:1px solid var(--line);border-radius:8px;color:var(--ink);font-family:var(--sans);font-size:.9rem;padding:11px 13px;cursor:text}
  .vid-edit input:focus{outline:none;border-color:var(--accent)}
  .no-vid{flex-direction:column;gap:6px}
  /* ---- Course: book + practice ---- */
  .book{max-width:66ch;margin:22px 0 6px}
  .bk-block{margin-bottom:20px}
  .bk-h{font-family:var(--serif);font-weight:400;font-size:1.15rem;color:var(--ink);margin-bottom:7px;letter-spacing:-.01em}
  .bk-p{color:var(--ink1);font-size:.98rem;line-height:1.7}
  .bk-key{border-left:2px solid var(--accent);background:var(--bg1);border-radius:0 10px 10px 0;padding:14px 18px;margin-top:6px}
  .bk-key-t{font-size:.58rem;text-transform:uppercase;letter-spacing:.18em;color:var(--ink2);margin-bottom:9px}
  .bk-key ul{list-style:none;display:flex;flex-direction:column;gap:7px}
  .bk-key li{font-size:.9rem;color:var(--ink);padding-left:16px;position:relative;line-height:1.45}
  .bk-key li:before{content:"→";position:absolute;left:0;color:var(--accent)}
  .quiz{border:1px solid var(--line);border-radius:14px;padding:20px;background:var(--bg1);margin:26px 0 6px;max-width:66ch}
  .quiz-t{font-size:.6rem;text-transform:uppercase;letter-spacing:.18em;color:var(--ink2);margin-bottom:16px;display:flex;justify-content:space-between}
  .quiz-t b{font-family:var(--serif);font-size:1.05rem;color:var(--ink)}
  .q{padding:14px 0;border-top:1px solid var(--line)}
  .q:first-of-type{border-top:none;padding-top:0}
  .q-q{font-size:.98rem;color:var(--ink);margin-bottom:12px;line-height:1.5}
  .q-opts{display:flex;flex-direction:column;gap:8px}
  .q-opt{text-align:left;background:#000;border:1px solid var(--line);border-radius:9px;color:var(--ink);font-family:var(--sans);font-size:.9rem;padding:11px 14px;cursor:pointer;transition:border-color .15s,background .15s,color .15s}
  .q-opt:not([disabled]):hover{border-color:var(--accent)}
  .q-opt[disabled]{cursor:default;opacity:1}
  .q-opt.opt-correct{border-color:#35c46f;background:rgba(53,196,111,.12);color:#8fe6b3}
  .q-opt.opt-wrong{border-color:var(--rojo);background:rgba(214,73,63,.12);color:#f0a39c}
  .q-why{font-size:.86rem;line-height:1.55;margin-top:11px;padding-left:2px}
  .quiz-done{font-size:.9rem;color:var(--ink1);margin-top:16px;padding-top:14px;border-top:1px solid var(--line)}
  .quiz-done.up{color:#8fe6b3}
  .vid-add{margin:22px 0 0}
  .vid-add summary{font-size:.7rem;text-transform:uppercase;letter-spacing:.12em;color:var(--ink2);cursor:pointer;padding:8px 0;list-style:none}
  .vid-add summary::-webkit-details-marker{display:none}
  .vid-add summary:hover{color:var(--ink)}
  .vid-add[open] summary{margin-bottom:12px}

  /* payout — the path */
  .payout-hero{text-align:center;margin-bottom:30px}
  .ph-l{font-size:.66rem;text-transform:uppercase;letter-spacing:.2em;color:var(--ink2);margin-bottom:12px}
  .ph-v{font-family:var(--serif);font-size:clamp(2.4rem,6vw,4rem);line-height:1;letter-spacing:-.02em;margin-bottom:20px}
  .ph-v span{color:var(--accent)}
  .prog-bar{height:8px;background:var(--bg1);border:1px solid var(--line);border-radius:999px;overflow:hidden;max-width:640px;margin:0 auto}
  .prog-bar.big{height:12px}
  .prog-bar span{display:block;height:100%;background:var(--accent);transition:width .6s var(--ease)}
  .ph-sub{font-size:.82rem;color:var(--ink1);margin-top:14px;letter-spacing:.02em}
  .funnel{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:26px}
  .fn{border:1px solid var(--line);border-radius:12px;padding:14px 18px;text-align:center;min-width:118px;background:var(--bg1);transition:all .4s}
  .fn.now{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent)}
  .fn.done{opacity:.55}
  .fn-i{width:22px;height:22px;border-radius:50%;border:1px solid var(--line);display:inline-grid;place-items:center;font-size:.66rem;margin-bottom:8px;font-variant-numeric:tabular-nums;color:var(--ink2)}
  .fn.now .fn-i{border-color:var(--accent);color:var(--accent)}
  .fn.done .fn-i{background:var(--accent);color:#0A0A0B;border-color:var(--accent)}
  .fn-n{font-family:var(--serif);font-size:1.05rem}
  .fn-note{font-size:.54rem;text-transform:uppercase;letter-spacing:.1em;color:var(--ink2);margin-top:3px}
  .fn-arr{color:var(--ink2);font-size:1rem}
  .pledge-txt{color:var(--ink1);font-size:.94rem;line-height:1.6;margin-bottom:18px;font-style:italic;font-family:var(--serif)}
  .signed{color:#35c46f;font-size:.8rem;letter-spacing:.04em}
  #acct-why{width:100%;min-height:56px;background:transparent;border:1px solid var(--line);border-radius:10px;color:var(--ink);font-family:var(--sans);font-size:.92rem;padding:11px 13px;resize:none;line-height:1.5;cursor:text;margin-bottom:16px}
  #acct-why:focus{outline:none;border-color:var(--ink1)}
  .acct-edit{display:flex;gap:16px;flex-wrap:wrap;font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--ink2);align-items:center}
  .acct-edit input{background:transparent;border:none;border-bottom:1px solid var(--line);color:var(--ink);font-family:var(--sans);font-size:.85rem;padding:4px 2px;width:92px;text-transform:none;letter-spacing:0;cursor:text}
  .acct-edit input:focus{outline:none;border-color:var(--accent)}
  .pout-add{display:flex;gap:10px;margin-bottom:14px}
  .pout-add .inp-money{flex:1}

  @media(prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>

  function csvSplit(line){ const out=[]; let cur="",q=false; for(let i=0;i<line.length;i++){ const c=line[i];

  function bulletScore(st,all){ // TradeZella-style score: 5 axes normalized 0-100

  function coachGroup(arr,keyFn,labelFn){ const m={};
    arr.forEach(t=>{const k=keyFn(t); if(k==null||k==="")return; (m[k]=m[k]||[]).push(t);});
    return Object.keys(m).map(k=>({key:k,label:labelFn(k),...NPstats(m[k])})); }
  const WD=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

  function coachInsights(all,st,stk){ const out=[];
    if(st.expectancy>0) out.push({tone:"good",title:`You have a real edge: ${money(st.expectancy)} per trade`,
      text:`Across ${st.n} trades your profit factor is ${pf_txt(st.profitFactor)} and your win rate ${st.winRate}%. This is exactly what the AI holds you to.`});
    else out.push({tone:"bad",title:`No edge yet: ${money(st.expectancy)} per trade`,
      text:`Profit factor ${pf_txt(st.profitFactor)} across ${st.n} trades. The goal is above 1.0 — below I show you where the money leaks.`});
    const rev=all.reduce((a,t)=>a+(t.revenges||0),0);
    if(rev>0) out.push({tone:"bad",title:`Revenge is your #1 leak`,
      text:`${rev} revenge attempt${rev!==1?"s":""} logged. Impulse entries after a loss are how small reds become blowups.`,
      rule:"After a loss the session locks — zero revenge, no exceptions."});
    const setups=coachGroup(all.filter(t=>t.setup),t=>t.setup,k=>SETUPS_L[k]||k).filter(r=>r.n>=2).sort((a,b)=>b.net-a.net);
    if(setups.length&&setups[0].net>0){const b=setups[0];
      out.push({tone:"good",title:`Your most profitable setup: ${b.label}`,
        text:`${money(b.net)} across ${b.n} trades · ${b.winRate}% win · PF ${pf_txt(b.profitFactor)}.`,
        rule:`Prioritize ${b.label} — the one bullet goes to your A+ setup only.`});}
    const sess=coachGroup(all.filter(t=>t.session),t=>t.session,k=>SESSIONS_L[k]||k).filter(r=>r.n>=2).sort((a,b)=>b.net-a.net);
    if(sess.length&&sess[0].net>0){const b=sess[0];
      out.push({tone:"good",title:`Your best window: ${b.label}`,
        text:`${money(b.net)} across ${b.n} trades · ${b.winRate}% win. This is where your edge lives.`,
        rule:`Aim your bullet at the ${b.label} session.`});
      const w=sess[sess.length-1]; if(sess.length>1&&w.net<0)
        out.push({tone:"bad",title:`${w.label} is costing you`,text:`${money(w.net)} across ${w.n} trades. Consider sitting out that window.`,rule:`No bullet in the ${w.label} session unless it's a clear A+.`});}
    const emos=coachGroup(all.filter(t=>t.emotion),t=>t.emotion,k=>EMO_L[k]||k).filter(r=>r.n>=2&&r.net<0).sort((a,b)=>a.net-b.net);
    if(emos.length){const e=emos[0];
      out.push({tone:"bad",title:`"${e.label}" costs you $${Math.round(Math.abs(e.net)).toLocaleString("en-US")}`,
        text:`${e.n} trades tagged ${e.label} with a ${e.winRate}% hit rate. Label the feeling live and step back.`,
        rule:`When the emotion tag fires, no entry — the feeling is the stop sign.`});}
    const wd=coachGroup(all.filter(t=>t.pnl!=null),wdOf,k=>WD[k]).filter(r=>r.n>=2).sort((a,b)=>a.net-b.net);
    if(wd.length&&wd[0].net<0){const w=wd[0];
      out.push({tone:"tip",title:`Watch out on ${w.label}s`,
        text:`On ${w.label}s you rack up ${money(w.net)} across ${w.n} trades (${w.winRate}% win).`,
        rule:`Optional: size down or sit out on ${w.label}s.`});}
    if(stk.ml>=3) out.push({tone:"tip",title:`Your worst streak was ${stk.ml} losses in a row`,
      text:`That's where accounts blow up. Your "one bullet, close cold" rule exists exactly for this.`,
      rule:"The day cuts at the max loss — without a single exception."});
    return out; }

  function capCalc(){ const ap=parseFloat(($("#cap-aporte")||{}).value)||0,ta=parseFloat(($("#cap-tasa")||{}).value)||0,meta=parseFloat(($("#cap-meta")||{}).value)||0;
    const timeEl=$("#cap-time"),chartEl=$("#cap-chart");
    if(ap>0&&meta>0){ const r=ta/100/12; let n=r>0?Math.log(1+meta*r/ap)/Math.log(1+r):meta/ap; n=Math.max(1,Math.min(n,1200));
      const months=Math.ceil(n),step=Math.max(1,Math.floor(months/60)),curve=[]; let bal=0;
      for(let i=1;i<=months;i++){ bal=bal*(1+r)+ap; if(i%step===0||i===months)curve.push(Math.min(bal,meta)); }
      const years=n/12,yr=Math.floor(years),mo=Math.round((years-yr)*12);
      if(timeEl)timeEl.innerHTML=`<span>${yr>0?yr+(yr!==1?" years":" year"):""}${yr>0&&mo>0?" ":""}${mo>0?mo+(mo!==1?" months":" month"):""}${yr===0&&mo===0?"under a month":""}</span>`;
      if(chartEl)chartEl.innerHTML=areaChart(curve,"#3d86cf");
    } else { if(timeEl)timeEl.textContent="—"; if(chartEl)chartEl.innerHTML=""; } }

  function topLeak(){ const h=histLoad().filter(x=>x.outcome); if(h.length<3)return null;
    const rev=h.reduce((a,x)=>a+(x.revenges||0),0);
    if(rev>0)return {txt:"Revenge after a loss", voz:"Your number one leak is revenge. After a loss, close the platform."};
    const fomo=h.filter(x=>x.emotion==="fomo").length, anx=h.filter(x=>x.emotion==="ansioso").length;
    if(fomo>=2)return {txt:"FOMO entries", voz:"Your leak is FOMO. Only fire on your A-plus, otherwise don't fire."};
    if(anx>=2)return {txt:"Trading anxious", voz:"You trade anxious. Breathe before you enter and wait for your setup."};
    const cnt={}; h.filter(x=>x.outcome==="BLOQUEADO").forEach(x=>{ if(x.setup)cnt[x.setup]=(cnt[x.setup]||0)+1; });
    let top=null,mx=1; for(const k in cnt){ if(cnt[k]>mx){mx=cnt[k];top=k;} }
    if(top)return {txt:"You keep losing on "+top.toUpperCase(), voz:"Your "+top+" setup keeps costing you. Review it or drop it today."};

    trades:{t:"Trades",s:"session log",f:viewTrades},
    coach:{t:"AI Coach",s:"what your data sees",f:viewCoach},
    progreso:{t:"Progress",s:"eval → funded → eden",f:viewProgress},
    cuentas:{t:"Accounts",s:"your funded accounts",f:viewAccounts},
    plan:{t:"Plan",s:"the map to scale",f:viewPlan},
    payouts:{t:"Payouts",s:"payout management",f:viewPayouts},
    settings:{t:"Settings",s:"your platform",f:viewSettings},
  };
  const NAV=[
    {r:"home",label:"Home"},{r:"course",label:"Course"},
    {group:"TRADE"},{r:"sesion",label:"Start Session"},{r:"training",label:"Training"},
    {group:"JOURNAL"},{r:"dashboard",label:"Dashboard"},{r:"trades",label:"Trades"},{r:"coach",label:"AI Coach"},{r:"progreso",label:"Progress"},{r:"cuentas",label:"Accounts"},
    {group:"MONEY"},{r:"plan",label:"Plan"},{r:"payouts",label:"Payouts"},
  ];
  function renderSidebar(){
    const name=profileLoad().handle||"trader";
    const cp=progLoad(), lc=allLessons(), cpct=lc.length?Math.round(lc.filter(l=>cp[l.id]).length/lc.length*100):0;
    const items=NAV.map(it=>it.group?`<div class="nav-group">${it.group}</div>`
      :`<button class="navitem" data-route="${it.r}" data-hover><span>${it.label}</span>${it.r==="course"?`<span class="nav-badge">${cpct}%</span>`:""}</button>`).join("");
    $("#sidebar").innerHTML=`<div class="sb-brand"><svg viewBox="0 0 32 32" class="brand-mark" aria-hidden="true"><ellipse cx="16" cy="16" rx="13.2" ry="6" fill="none" stroke="currentColor" stroke-width="1.4" opacity=".45"/><circle class="lock" cx="16" cy="16" r="3.7" fill="none" stroke="var(--accent)" stroke-width="1.35"/><circle cx="16" cy="16" r="1.5" fill="var(--accent)"/></svg></div>${userLoad()?`<div class="trial-badge">Full access</div>`:""}
      <button class="sb-profile" data-route="profile" data-hover><span class="tb-av">${(name.trim()[0]||"T").toUpperCase()}</span><span class="sb-pinfo"><b>${esc(name)}</b><small>your profile</small></span></button>
      <nav class="navlist">${items}</nav>
      <div class="sb-foot"><button class="navitem" data-route="settings" data-hover><span>Settings</span></button><a class="navitem" href="${DISCORD}" target="_blank" rel="noopener" data-hover><span>Discord →</span></a></div>`;
  }
  function toggleNav(){const s=document.getElementById("sidebar");if(s)s.classList.toggle("open");}
  let vistaActual="home";
  function mostrar(v){ if(!VISTAS[v])v="home"; vistaActual=v; if(v!=="course")courseLesson=null;
    document.querySelectorAll("#sidebar .navitem[data-route]").forEach(a=>a.classList.toggle("on",a.dataset.route===v));
    const s=document.getElementById("sidebar"); if(s)s.classList.remove("open");
    const V=VISTAS[v], chip="";
    $("#panel").innerHTML=`<div class="pv-head"><div><div class="pv-title">${V.t}</div><div class="pv-sub">${V.s}</div></div>${chip}</div>`+V.f();
    $("#panel").scrollTop=0;
    if(v==="investments")capCalc();
    if(v==="payouts")splitCalc();
    if(v==="comunidad"||v==="progreso")requestAnimationFrame(()=>requestAnimationFrame(()=>{document.querySelectorAll(".rc-run").forEach(r=>{r.style.left=r.dataset.pos+"%";});}));
  }
  document.addEventListener("click",e=>{
    const sp=e.target.closest("[data-spot]"); if(sp){openSpotModal(sp.dataset.spot);return;}
    const up=e.target.closest("[data-uprofile]"); if(up&&up.dataset.uprofile){openUserProfile(up.dataset.uprofile);return;}
    if(e.target.closest("[data-spotclose]")||e.target.id==="spot-modal"){const m=document.getElementById("spot-modal");if(m){m.hidden=true;m.innerHTML="";}return;}
    const ds=e.target.closest("[data-dashsrc]"); if(ds){DASH_SRC=ds.dataset.dashsrc;DASH_ACCT="";mostrar("dashboard");return;}
    const da=e.target.closest("[data-dashacct]"); if(da){DASH_ACCT=da.dataset.dashacct||"";mostrar("dashboard");return;}
    const te=e.target.closest("[data-tedit]"); if(te){tradeEdit(te.dataset.tedit);return;}
    if(e.target.closest("[data-tradeclose]")||e.target.id==="trade-modal"){closeTradeModal();return;}
    if(e.target.closest("[data-crewclose]")||e.target.id==="crew-modal"){closeCrewModal();return;}
    const fp=e.target.closest("[data-firmpreset]"); if(fp){const a=acctLoad()||{size:50000,evalTarget:1000};a.firm=fp.dataset.firmpreset;delete a.dailyLoss;delete a.maxDD;delete a.consistency;delete a.minDays;acctSave(a);mostrar("settings");return;} // firm → automatic rules by phase
    const gph=e.target.closest("[data-guardphase]"); if(gph){const a=acctLoad()||{size:50000,evalTarget:1000},k=gph.dataset.guardphase;if(k==="auto")delete a.guardPhase;else a.guardPhase=k;acctSave(a);mostrar("settings");return;}
    const a=e.target.closest("[data-route]"); if(a){mostrar(a.dataset.route);return;}
    const les=e.target.closest("[data-lesson]"); if(les){courseLesson=les.dataset.lesson;mostrar("course");return;}
    if(e.target.closest("[data-back]")){courseLesson=null;mostrar("course");return;}
    const comp=e.target.closest("[data-complete]"); if(comp){const id=comp.dataset.complete,p=progLoad();p[id]=!p[id];progSave(p);renderSidebar();mostrar("course");return;}
    const sv=e.target.closest("[data-savevid]"); if(sv){saveVid(sv.dataset.savevid);return;}
    const ob=e.target.closest("[data-onb]"); if(ob&&ONB){const a=ob.dataset.onb;
      if(a==="next")ONB.step=Math.min(ONB.step+1,ONB_STEPS.length-1);
      else if(a==="back")ONB.step=Math.max(ONB.step-1,0);
      else if(a==="finish"){finishOnb();return;}
      renderOnb();return;}
    const oc=e.target.closest("[data-onbcomm]"); if(oc&&ONB){const k=oc.dataset.onbcomm;ONB.data.comms[k]=!ONB.data.comms[k];renderOnb();return;}
    const pm=e.target.closest("[data-planmode]"); if(pm){try{localStorage.setItem("candado_planmode",pm.dataset.planmode);}catch(x){} mostrar("plan");return;}
    const of=e.target.closest("[data-onbfirm]"); if(of&&ONB){ONB.data.firm=of.dataset.onbfirm;renderOnb();return;}
    const oe=e.target.closest("[data-onbexp]"); if(oe&&ONB){ONB.data.exp=oe.dataset.onbexp;renderOnb();return;}
    const go=e.target.closest("[data-go]"); if(go){mostrar(go.dataset.go);return;}
    const sm=e.target.closest("[data-sesmode]"); if(sm){sesModeSave(sm.dataset.sesmode);mostrar("sesion");return;}
    const sa=e.target.closest("[data-sesacct]"); if(sa){sesAcctSave(sa.dataset.sesacct);mostrar("sesion");return;}
    const ad=e.target.closest("[data-acdel]"); if(ad){const a=acctsLoad()||[];a.splice(+ad.dataset.acdel,1);acctsSave(a);mostrar("cuentas");return;}
    const cb=e.target.closest("[data-cal]"); if(cb){ let [y,m]=calMonth.split("-").map(Number); m+=(+cb.dataset.cal); if(m<1){m=12;y--;} if(m>12){m=1;y++;} calMonth=y+"-"+String(m).padStart(2,"0"); mostrar(vistaActual); } });

  /* ---------- User · silent profile (no gate, free entry) ---------- */
  function userLoad(){try{return JSON.parse(localStorage.getItem("candado_user"))||null;}catch(e){return null;}}
  function userSave(u){try{localStorage.setItem("candado_user",JSON.stringify(u));}catch(e){}}
  /* ---------- Backup / restore of the journal (everything lives in localStorage) ---------- */
  function exportData(){ const o={}; for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k&&k.indexOf("candado_")===0)o[k]=localStorage.getItem(k); }
    const blob=new Blob([JSON.stringify({app:"SPOTTER AI",exported:new Date().toISOString(),data:o},null,2)],{type:"application/json"});
    const u=URL.createObjectURL(blob),a=document.createElement("a"); a.href=u; a.download="spotter-backup-"+hoy()+".json"; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(u),3000); }
  function importDataClick(){ let inp=document.getElementById("import-input");
    if(!inp){ inp=document.createElement("input"); inp.type="file"; inp.accept=".json,application/json"; inp.id="import-input"; inp.style.display="none"; inp.addEventListener("change",importDataFile); document.body.appendChild(inp); }
    inp.value=""; inp.click(); }
  function importDataFile(e){ const f=e.target.files&&e.target.files[0]; if(!f)return;
    const r=new FileReader(); r.onload=()=>{ try{ const j=JSON.parse(String(r.result)), d=(j&&j.data)||j;
      if(!d||typeof d!=="object")throw 0;
      const keys=Object.keys(d).filter(k=>k.indexOf("candado_")===0); if(!keys.length){ alert("That file has no SPOTTER AI data."); return; }
      if(!confirm("Restore this backup? It replaces your current data on this device."))return;
      keys.forEach(k=>{ try{localStorage.setItem(k,d[k]);}catch(x){} }); location.reload();
    }catch(err){ alert("Couldn't read the backup. Is it a file exported from SPOTTER AI?"); } }; r.readAsText(f); }
  (function(){const b=document.getElementById("pwa-install");if(!b)return;
    b.addEventListener("click",async()=>{const p=window.__pwa;if(!p){alert("Open this app in Chrome and use the install icon in the address bar.");return;}
      p.prompt();try{await p.userChoice;}catch(e){} window.__pwa=null;document.documentElement.classList.remove("can-install");});})();
  /* ---------- Onboarding · new-user experience ---------- */
  let ONB=null;
  const ONB_STEPS=["Welcome","Profile","Account","Rules","Your why","Communities","Launch","Done"];
  function startOnb(){
    const p=profileLoad(), a=acctLoad()||{}, r=rulesLoad();
    ONB={step:0,data:{handle:p.handle||"",firm:a.firm||"Tradeify",size:a.size||50000,target:a.evalTarget||1000,exp:"new",
      trades:r.trades,risk:r.risk,sess:r.sess,ptarget:r.target,why:a.why||"",
      comms:Object.assign({discord:false,live:false,battles:false,news:false},p.communities||{})}};
    if(!document.getElementById("onb")){const d=document.createElement("div");d.id="onb";document.body.appendChild(d);}
    renderOnb();
  }
  function finishOnb(){
    const d=ONB.data;
    const p=profileLoad(); p.handle=(d.handle||"trader").trim()||"trader"; p.communities=d.comms; profileSave(p);
    const acc={firm:d.firm||"Tradeify",size:d.size||50000,evalTarget:d.target||1000,why:d.why||""};
    if(d.exp==="funded")acc.guardPhase="funded"; // already funded → the guard uses funded-account rules from day 1
    acctSave(acc);
    rulesSave({trades:d.trades||1,risk:d.risk||1,sess:d.sess||1.5,target:d.ptarget||2});
    try{localStorage.setItem("candado_onboarded","1");}catch(e){}
    ONB=null; const o=document.getElementById("onb"); if(o)o.remove();
    supaUpsert(); renderSidebar(); mostrar("home");
  }
  function onbPill(list,cur,attr){ return list.map(x=>`<button class="onb-pill ${x[0]===cur?"on":""}" data-${attr}="${x[0]}" data-hover>${x[1]}</button>`).join(""); }
  function renderOnb(){
    const o=document.getElementById("onb"); if(!o||!ONB)return;
    const d=ONB.data, s=ONB.step, last=ONB_STEPS.length-1;
    const prog=`<div class="onb-prog">${ONB_STEPS.map((_,i)=>`<span class="${i<=s?"on":""}"></span>`).join("")}</div>`;
    let body="";
    if(s===0) body=`<div class="onb-brand"><svg viewBox="0 0 32 32" class="brand-mark" aria-hidden="true"><ellipse cx="16" cy="16" rx="13.2" ry="6" fill="none" stroke="currentColor" stroke-width="1.4" opacity=".45"/><circle class="lock" cx="16" cy="16" r="3.7" fill="none" stroke="var(--accent)" stroke-width="1.35"/><circle cx="16" cy="16" r="1.5" fill="var(--accent)"/></svg>SPOTTER <i>AI</i></div>
      <h1 class="onb-h">From zero<br>to <em>payout.</em></h1>
      <p class="onb-p">Two minutes to set up your platform — your profile, your rules, your room. Everything stays yours and editable.</p>
      <button class="btn fill lg" data-onb="next" data-hover>Start →</button>`;
    else if(s===1) body=`<div class="onb-k">Profile</div><h2 class="onb-h2">What do we call you?</h2>
      <input id="onb-handle" class="onb-big" placeholder="your handle" value="${esc(d.handle)}" autocomplete="off">
      <p class="onb-p">This is your name on the race, the leaderboards and your profile card.</p>`;
    else if(s===2) body=`<div class="onb-k">Your account</div><h2 class="onb-h2">Where are you trading?</h2>
      <div class="onb-row">${onbPill([["Tradeify","Tradeify"],["Apex","Apex"],["Lucid","Lucid"],["Other","Other"]],d.firm,"onbfirm")}</div>
      <div class="onb-fields">
        <label>Account size $<input id="onb-size" type="number" value="${d.size}"></label>
        <label>Eval target $<input id="onb-target" type="number" value="${d.target}"></label>
      </div>
      <div class="onb-k" style="margin-top:26px">Experience</div>
      <div class="onb-row">${onbPill([["new","Brand new"],["some","Some experience"],["funded","Already funded"]],d.exp,"onbexp")}</div>`;
    else if(s===3) body=`<div class="onb-k">Session rules</div><h2 class="onb-h2">Your rules. Set them cold.</h2>
      <div class="ses-rules onb-rules">
        <div class="sr-rule"><span>Max trades</span><b><input class="rul-inp" id="onb-trades" type="number" min="1" value="${d.trades}"></b></div>
        <div class="sr-rule"><span>Risk / trade</span><b><input class="rul-inp" id="onb-risk" type="number" step="0.1" value="${d.risk}">%</b></div>
        <div class="sr-rule"><span>Session risk</span><b><input class="rul-inp" id="onb-sess" type="number" step="0.1" value="${d.sess}">%</b></div>
        <div class="sr-rule"><span>Profit target</span><b class="up">+<input class="rul-inp" id="onb-ptarget" type="number" step="0.1" value="${d.ptarget}">%</b></div>
      </div>
      <p class="onb-p">We recommend one bullet — one planned trade a session. You can change these any time before a session.</p>`;
    else if(s===4) body=`<div class="onb-k">Your why</div><h2 class="onb-h2">What does your first payout buy?</h2>
      <textarea id="onb-why" class="home-editor onb-why" placeholder="your apartment, your car, your freedom…">${esc(d.why)}</textarea>
      <p class="onb-p">When you're red and tempted, logic won't stop you — your reason will.</p>`;
    else if(s===5){ const C=d.comms;
      const card=(k,t,sub)=>`<button class="onb-comm ${C[k]?"on":""}" data-onbcomm="${k}" data-hover><span class="oc-check">${C[k]?"✓":""}</span><div><b>${t}</b><p>${sub}</p></div></button>`;
      body=`<div class="onb-k">Communities</div><h2 class="onb-h2">Join the room.</h2>
      <p class="onb-p" style="margin-top:0">Pick what you want in — <b>nothing is automatic</b>. You can join or leave any time.</p>
      <div class="onb-comms">
        ${card("discord","SPOTTER AI Discord","The main room — daily bias, payouts, the crew")}
        ${card("live","Live NY sessions","Trade the open together every morning")}
        ${card("battles","1v1 battles","Same replay, best P&L wins — Elo on the line")}
        ${card("news","Announcements & daily bias","The tape brief, every morning")}
      </div>
      <a class="btn accent" href="${DISCORD}" target="_blank" rel="noopener" data-hover>Join the Discord now →</a>`; }
    else if(s===6) body=`<div class="onb-k">Your session</div><h2 class="onb-h2">This is how it <em>launches.</em></h2>
      <p class="onb-p" style="margin-top:0">One click opens your whole battlestation — the platform, your live charts, and the Spotter watching with you.</p>
      <div class="onb-launch">
        <div class="olw"><span class="olw-dot"></span>SPOTTER AI · your platform</div>
        <div class="olw"><span class="olw-dot"></span>TradingView · live charts</div>
        <div class="olw spot"><span class="olw-dot live"></span>The Spotter · watching + voice</div>
      </div>
      <div class="onb-flow">
        <div class="olf"><span class="olf-n">1</span><p>Hit <b>Start session</b> — your charts and the platform open together.</p></div>
        <div class="olf"><span class="olf-n">2</span><p>The <b>Spotter</b> talks you through the open on voice — context, never signals.</p></div>
        <div class="olf"><span class="olf-n">3</span><p>One bullet. When you close it, your <b>session report</b> writes itself.</p></div>
      </div>`;
    else body=`<div class="onb-brand sm">SPOTTER <i>AI</i></div>
      <h2 class="onb-h2">You're set, <em>${esc((d.handle||"trader").trim()||"trader")}.</em></h2>
      <div class="onb-sum">
        <div class="alloc-row"><span>Account</span><b>${esc(d.firm)} · $${(d.size||0).toLocaleString("en-US")}</b></div>
        <div class="alloc-row"><span>Eval target</span><b>$${(d.target||0).toLocaleString("en-US")}</b></div>
        <div class="alloc-row"><span>Rules</span><b>${d.trades} bullet · ${d.risk}% / ${d.sess}% · +${d.ptarget}%</b></div>
        <div class="alloc-row"><span>Communities</span><b>${Object.values(d.comms).filter(Boolean).length?Object.values(d.comms).filter(Boolean).length+" joined":"none — join any time"}</b></div>
      </div>
      <p class="onb-p">The chamber is loaded. See you at the New York open.</p>
      <button class="btn fill lg" data-onb="finish" data-hover>Enter the platform →</button>`;
    o.innerHTML=`<div class="onb-bg"></div><div class="onb-card">${prog}${body}
      ${s>0&&s<last?`<div class="onb-nav">
        <button class="btn ghost" data-onb="back" data-hover>← Back</button>
        <button class="btn fill" data-onb="next" data-hover>Continue →</button>
      </div>`:""}
      ${s===0?`<button class="onb-skip" data-onb="finish" data-hover>skip setup</button>`:""}</div>`;
    const fi=o.querySelector("#onb-handle,#onb-why"); if(fi)fi.focus();
  }

  /* start */
  document.body.classList.add("data-view-open");
  renderSidebar();
  mostrar("home");
  if(localStorage.getItem("candado_demo")){ localStorage.removeItem("candado_historial");localStorage.removeItem("candado_demo"); }
  if(!userLoad()) userSave({handle:"trader",at:Date.now()}); // no code: free entry
  // friends = full access free: no trial lock (re-enabled when it goes public)
  if(!localStorage.getItem("candado_onboarded")) startOnb();

  /* live backend: publishes your profile and pulls the real community */
  supaUpsert(); supaRefresh(); setInterval(supaRefresh, 45000);

  /* ---------- LIVE: banner when André streams (Kick/YouTube) ---------- */
  function applyLive(d){
    try{ d=(typeof d==="string")?JSON.parse(d):(d||{}); }catch(e){ d={}; }
    let bar=document.getElementById("live-bar");
    if(d&&d.live&&d.url){
      if(!bar){ bar=document.createElement("a"); bar.id="live-bar"; bar.className="live-bar"; bar.target="_blank"; bar.rel="noopener"; document.body.appendChild(bar); }
      bar.href=d.url;
      const plat=({kick:"Kick",youtube:"YouTube",twitch:"Twitch"})[d.platform]||d.platform||"live";
      bar.innerHTML=`<span class="lb-dot"></span><b>LIVE</b> · ${esc(d.title||"André is streaming")} · ${plat} <span class="lb-cta">Watch now →</span>`;
    }else if(bar){ bar.remove(); }
  }
  /* --- the Spotter's eye: a watchman. It sweeps, locks on, holds. It never follows you. --- */
  (function(){ const ball=document.getElementById("eyeBall"); if(!ball)return;
    const pupil=ball.querySelector("circle:last-child");
    let cx=0,cy=0,tx=0,ty=0,hold=0,t=0;
    function newTarget(){ const r=Math.random();
      if(r<.55){ tx=(Math.random()*2-1)*95; ty=(Math.random()*2-1)*24; hold=140+Math.random()*160; }   // sweeps, searching
      else if(r<.85){ tx=Math.max(-100,Math.min(100,tx+(Math.random()*2-1)*28));                       // locks on, holds
                      ty=Math.max(-27,Math.min(27,ty+(Math.random()*2-1)*10)); hold=200+Math.random()*220; }
      else { tx=0; ty=0; hold=120+Math.random()*120; }                                                  // back to centre, on guard
    }
    newTarget();
    (function loop(){ t++;
      if(--hold<=0) newTarget();
      cx+=(tx-cx)*.018; cy+=(ty-cy)*.018;                                    // heavy, deliberate gaze
      const jx=Math.sin(t*.13)*.7, jy=Math.cos(t*.11)*.5;                    // micro-tremor: alive, tense
      ball.setAttribute("transform","translate("+(cx+jx).toFixed(1)+","+(cy+jy).toFixed(1)+")");
      if(pupil){ const d=Math.hypot(tx-cx,ty-cy);                            // pupil narrows as it focuses
        pupil.setAttribute("r",(21-Math.min(5,d*.04)+Math.sin(t*.02)*1.2).toFixed(1)); }
      requestAnimationFrame(loop); })();
  })();
  window.__liveStatus=applyLive;                 // the native app injects the status here
  /* --- session auto-detection + global hotkey ⌘⇧B (injected by the native app) --- */
  window.__tradingDetected=function(platform){ try{
    const s=sessLoad(); if(s.phase==="live"||s.phase==="fired")return; if(todaySealed())return;
    const last=+localStorage.getItem("candado_tradenudge")||0; if(Date.now()-last<600000)return; // don't nudge more than once / 10 min
    localStorage.setItem("candado_tradenudge",String(Date.now()));
    TRADING_NUDGE=platform||"your platform"; statusPush("detected");
    if(vistaActual==="home"||vistaActual==="sesion")mostrar(vistaActual);
    spkr("Detected "+(platform||"your platform")+". Start your session? Remember, just one bullet.");
  }catch(e){} };
  window.__hotkeyFire=function(){ try{ const s=sessLoad();
    if(s.phase==="live")fireBullet(); else if(s.phase==="fired")mostrar("sesion"); else startSession();
  }catch(e){} };
  function pollLive(){ fetch("live.json?t="+Date.now()).then(r=>r.ok?r.json():null).then(d=>{if(d)applyLive(d);}).catch(()=>{}); }
  if(location.protocol!=="file:"){ pollLive(); setInterval(pollLive,60000); } // web: direct fetch; native: via Swift
})();
</script>

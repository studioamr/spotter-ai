<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPOTTER AI — AI Trading Assistant</title>
<meta name="theme-color" content="#0A0A0B">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="assets/icon_192.png">
<link rel="apple-touch-icon" href="assets/icon_192.png">
<style>
  :root{
    --bg:#0A0A0B; --bg1:#0F0F11; --ink:#F4F1EA;
    --ink1:rgba(244,241,234,.55); --ink2:rgba(244,241,234,.30);
    --line:rgba(244,241,234,.14); --accent:#3d86cf; --accent2:#5B9BD5; --rojo:#d6493f;
    --serif:"Hoefler Text",Georgia,"Times New Roman",serif;
    --sans:"Inter Tight","Helvetica Neue",-apple-system,system-ui,sans-serif;
    --ease:cubic-bezier(.19,1,.22,1);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:var(--sans); background:var(--bg); color:var(--ink);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    overflow-x:hidden; overflow-y:auto;
    transition:background .6s var(--ease), color .6s var(--ease);
  }
  @media(pointer:coarse){body{cursor:auto}}
  ::selection{background:var(--accent);color:#0A0A0B}
  /* no visible scrollbars anywhere — scrolling still works */
  *{scrollbar-width:none;-ms-overflow-style:none}
  *::-webkit-scrollbar{display:none;width:0;height:0}
  /* ===== NorthPoint-style shell (sidebar + topbar + content) ===== */
  .sidebar{position:fixed;top:0;left:0;bottom:0;width:232px;z-index:30;display:flex;flex-direction:column;
    background:rgba(10,10,11,.72);backdrop-filter:blur(12px);border-right:1px solid var(--line);padding:22px 15px}
  .trial-badge{margin:-8px 10px 12px;font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);border:1px solid rgba(61,134,207,.35);background:rgba(61,134,207,.08);border-radius:6px;padding:5px 9px;text-align:center}
  .sb-brand{display:flex;align-items:center;gap:11px;font-family:var(--sans);font-size:12.5px;letter-spacing:.22em;font-weight:600;padding:6px 8px 20px}
  .sb-brand i{color:var(--accent);font-style:normal}
  .brand-mark{width:26px;height:26px;flex:none;display:block;color:var(--ink);overflow:visible}
  .brand-mark .spin{transform-origin:16px 16px;animation:markSpin 24s linear infinite}
  .brand-mark .lock{transform-origin:16px 16px;animation:markPulse 3.4s ease-in-out infinite}
  @keyframes markSpin{to{transform:rotate(360deg)}}
  @keyframes markPulse{0%,100%{opacity:.75;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
  @media(prefers-reduced-motion:reduce){.brand-mark .spin,.brand-mark .lock{animation:none}}
  .sb-profile{display:flex;align-items:center;gap:11px;width:100%;background:none;border:1px solid var(--line);border-radius:12px;padding:9px 11px;margin-bottom:14px;cursor:pointer;text-align:left;transition:border-color .2s}
  .sb-profile:hover{border-color:var(--ink2)}
  .tb-av{width:34px;height:34px;border-radius:50%;flex:none;display:grid;place-items:center;font-family:var(--serif);font-size:1rem;color:var(--ink);border:1px solid var(--line);background:radial-gradient(120% 120% at 30% 20%,rgba(61,134,207,.35),rgba(15,15,17,.6))}
  .sb-pinfo{display:flex;flex-direction:column;overflow:hidden}
  .sb-pinfo b{font-size:.9rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sb-pinfo small{font-size:.66rem;color:var(--ink2)}
  .navlist{display:flex;flex-direction:column;gap:1px;flex:1;overflow-y:auto;margin:0 -3px}
  .nav-group{font-size:.55rem;text-transform:uppercase;letter-spacing:.2em;color:var(--ink2);padding:15px 12px 7px}
  .navitem{display:flex;align-items:center;gap:10px;width:100%;background:none;border:none;border-radius:9px;padding:9px 13px;color:var(--ink1);font-family:var(--sans);font-size:.9rem;cursor:pointer;text-align:left;transition:background .2s,color .2s;text-decoration:none}
  .navitem:hover{background:rgba(244,241,234,.05);color:var(--ink)}
  .navitem.on{background:rgba(61,134,207,.13);color:var(--ink)}
  .nav-badge{margin-left:auto;font-size:.6rem;color:var(--accent);font-variant-numeric:tabular-nums}
  .sb-foot{border-top:1px solid var(--line);padding-top:8px;margin-top:8px}
  .shell{margin-left:232px;min-height:100vh;display:flex;flex-direction:column}
  .topbar{position:sticky;top:0;z-index:15;display:flex;justify-content:space-between;align-items:center;
    padding:13px 30px;border-bottom:1px solid var(--line);background:rgba(10,10,11,.65);backdrop-filter:blur(10px)}
  .topbar .tb-menu{display:none;background:none;border:none;color:var(--ink1);font-size:1.2rem;cursor:pointer}
  .tb-right{display:flex;align-items:center}
  .mkt{font-size:.7rem;color:var(--ink1);letter-spacing:.06em;display:inline-flex;align-items:center;gap:7px}
  .mkt i{width:7px;height:7px;border-radius:50%;background:#35c46f;box-shadow:0 0 8px #35c46f}
  .mkt.closed i{background:var(--ink2);box-shadow:none}
  #clock{font-family:var(--sans);font-size:.72rem;color:var(--ink2);font-variant-numeric:tabular-nums;letter-spacing:.05em;margin-left:16px}
  #panel.content{padding:clamp(24px,4vw,44px);flex:1;width:100%;max-width:1200px;display:block}
  @media(max-width:860px){
    .sidebar{transform:translateX(-100%);transition:transform .3s var(--ease);width:250px}
    .sidebar.open{transform:none}
    .shell{margin-left:0}
    .topbar .tb-menu{display:block}
  }
  /* Rutina */
  .rutina{display:flex;flex-direction:column;gap:18px}
  .rutina-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media(max-width:720px){.rutina-grid{grid-template-columns:1fr}}
  .chk-list{display:flex;flex-direction:column}
  .chk{display:flex;align-items:center;gap:13px;width:100%;background:none;border:none;border-top:1px solid var(--line);padding:14px 4px;color:var(--ink1);font-family:var(--sans);font-size:.94rem;cursor:pointer;text-align:left}
  .chk:first-child{border-top:none}
  .chk-box{width:19px;height:19px;border-radius:6px;border:1.5px solid var(--line);flex:none;position:relative;transition:all .2s}
  .chk.on{color:var(--ink)}
  .chk.on .chk-box{background:var(--accent);border-color:var(--accent)}
  .chk.on .chk-box::after{content:"✓";position:absolute;inset:0;display:grid;place-items:center;color:#0A0A0B;font-size:.72rem;font-weight:700}
  .rules4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  @media(max-width:640px){.rules4{grid-template-columns:1fr 1fr}}
  .r4{border:1px solid var(--line);border-radius:12px;padding:16px;text-align:center}
  .r4 b{font-family:var(--serif);font-size:1.8rem;display:block;color:var(--accent);line-height:1}
  .r4 span{font-size:.72rem;color:var(--ink2);margin-top:9px;display:block;line-height:1.35}
  /* Accounts */
  .acct-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:18px}
  @media(max-width:720px){.acct-grid{grid-template-columns:1fr}}
  .acct-card{display:flex;flex-direction:column;gap:14px;position:relative}
  .ac-x{position:absolute;top:10px;right:12px;background:none;border:none;color:var(--ink2);font-size:1.05rem;line-height:1;cursor:pointer;padding:4px;opacity:0;transition:opacity .2s,color .2s}
  .acct-card:hover .ac-x{opacity:1}
  .ac-x:hover{color:var(--rojo)}
  .ac-head{display:flex;align-items:center;gap:12px}
  .ac-size{font-size:.72rem;color:var(--ink2);margin-top:2px}
  .ac-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;border-top:1px solid var(--line);padding-top:13px}
  .ac-stats span{font-size:.56rem;text-transform:uppercase;letter-spacing:.1em;color:var(--ink2);display:block;margin-bottom:5px}
  .ac-stats b{font-size:1.05rem;font-variant-numeric:tabular-nums}
  .acct-add{display:grid;place-items:center;color:var(--ink2);font-family:var(--sans);font-size:.9rem;border-style:dashed;cursor:pointer;min-height:130px}
  .acct-add:hover{color:var(--ink);border-color:var(--ink2)}
  /* Rutina · session launcher */
  .btn.lg{padding:14px 26px;font-size:.98rem}
  .sess-ready,.sess-live,.sess-done{display:flex;flex-direction:column;gap:18px}
  .sr-hero,.sd-hero{padding:clamp(28px,5vw,44px);text-align:center;
    background:linear-gradient(180deg,rgba(61,134,207,.08),transparent 70%)}
  .sr-eyebrow{font-size:.6rem;text-transform:uppercase;letter-spacing:.24em;color:var(--accent);margin-bottom:16px}
  .sr-h{font-family:var(--serif);font-weight:400;font-size:clamp(2rem,5vw,3.2rem);letter-spacing:-.02em;line-height:1.05;margin-bottom:16px}
  .sr-h em{font-style:italic;color:var(--accent)}
  .sr-p{color:var(--ink1);font-size:clamp(.95rem,1.5vw,1.1rem);line-height:1.6;max-width:58ch;margin:0 auto 24px}
  .sr-p b{color:var(--ink);font-weight:500}
  .sr-steps{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  @media(max-width:820px){.sr-steps{grid-template-columns:1fr 1fr}}
  @media(max-width:520px){.sr-steps{grid-template-columns:1fr}}
  .sr-step{border:1px solid var(--line);border-radius:12px;background:var(--bg1);padding:18px;display:flex;gap:13px;align-items:flex-start}
  .sr-n{font-family:var(--mono,var(--sans));font-size:.72rem;color:var(--accent);font-variant-numeric:tabular-nums;margin-top:2px}
  .sr-step b{font-size:.94rem;font-weight:600;display:block;margin-bottom:5px}
  .sr-step p{color:var(--ink2);font-size:.8rem;line-height:1.45}
  .sl-top{display:flex;justify-content:space-between;align-items:center}
  .sl-status{font-size:.86rem;color:var(--ink1);display:flex;align-items:center;gap:10px}
  .sl-status b{color:var(--ink);font-weight:600}
  .sl-dot{width:9px;height:9px;border-radius:50%;background:#35c46f;box-shadow:0 0 0 0 rgba(53,196,111,.5);animation:slpulse 1.6s infinite}
  @keyframes slpulse{0%{box-shadow:0 0 0 0 rgba(53,196,111,.45)}70%{box-shadow:0 0 0 9px rgba(53,196,111,0)}100%{box-shadow:0 0 0 0 rgba(53,196,111,0)}}
  .sl-time{font-family:var(--serif);font-size:1.4rem;color:var(--ink);font-variant-numeric:tabular-nums}
  .sess-flow{display:flex;flex-direction:column;gap:10px}
  .sf-step{display:flex;align-items:center;gap:15px;width:100%;text-align:left;border:1px solid var(--line);border-radius:12px;background:var(--bg1);padding:18px 20px;cursor:pointer;transition:border-color .2s,background .2s}
  .sf-step .sf-n{font-family:var(--serif);font-size:1.1rem;color:var(--ink2);flex:none;width:26px}
  .sf-b{flex:1}
  .sf-b b{font-size:1rem;font-weight:600;display:block;margin-bottom:3px}
  .sf-b p{color:var(--ink2);font-size:.82rem;line-height:1.4}
  .sf-mark{font-size:.64rem;text-transform:uppercase;letter-spacing:.12em;color:var(--ink2);border:1px solid var(--line);border-radius:6px;padding:6px 10px;white-space:nowrap}
  .sf-step.now{border-color:var(--accent)}
  .sf-step.now .sf-n{color:var(--accent)}
  .sf-step.done{opacity:.62}
  .sf-step.done .sf-mark{color:#35c46f;border-color:#35c46f}
  .sf-step.trading{cursor:default;background:linear-gradient(180deg,rgba(61,134,207,.07),transparent)}
  .sf-live{font-size:.6rem;text-transform:uppercase;letter-spacing:.16em;color:#35c46f;border:1px solid #35c46f;border-radius:999px;padding:5px 11px;white-space:nowrap}
  .sl-actions{display:flex;gap:12px;flex-wrap:wrap}
  /* session phases */
  .ses-rules{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  @media(max-width:720px){.ses-rules{grid-template-columns:1fr 1fr}}
  .sr-rule{border:1px solid var(--line);border-radius:12px;padding:16px;text-align:center}
  .sr-rule span{font-size:.6rem;text-transform:uppercase;letter-spacing:.14em;color:var(--ink2);display:block;margin-bottom:9px}
  .sr-rule b{font-family:var(--serif);font-size:1.7rem;font-weight:400;line-height:1}
  .ses-grid{display:grid;grid-template-columns:1.5fr 1fr;gap:18px}
  @media(max-width:820px){.ses-grid{grid-template-columns:1fr}}
  .ses-main{display:flex;flex-direction:column;gap:16px}
  .btn.fire{border-color:var(--accent);background:var(--accent);color:#0A0A0B;font-size:1.05rem;align-self:flex-start}
  .btn.fire:hover{filter:brightness(1.12)}
  .ses-checks{display:flex;gap:14px;flex-wrap:wrap;font-size:.72rem;color:#35c46f;letter-spacing:.04em}
  .ses-checks .wait{color:var(--ink2)}
  .ses-ul{list-style:none;display:flex;flex-direction:column;gap:9px}
  .ses-ul li{font-size:.88rem;color:var(--ink1);padding-left:16px;position:relative;line-height:1.45}
  .ses-ul li::before{content:"→";position:absolute;left:0;color:var(--accent)}
  .ses-ul li b{color:var(--ink)}
  .ses-seal{display:flex;gap:14px;flex-wrap:wrap}
  .ses-seal .btn{min-width:150px;justify-content:center;font-size:1.05rem}
  .sl-dot.fired{background:var(--accent);animation-name:slpulse2}
  @keyframes slpulse2{0%{box-shadow:0 0 0 0 rgba(61,134,207,.5)}70%{box-shadow:0 0 0 9px rgba(61,134,207,0)}100%{box-shadow:0 0 0 0 rgba(61,134,207,0)}}
  .sd-hero.won{background:linear-gradient(180deg,rgba(53,196,111,.1),transparent 70%)}
  .sd-hero.lost{background:linear-gradient(180deg,rgba(214,73,63,.09),transparent 70%)}
  .ses-log{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px}
  .ses-log label{display:flex;flex-direction:column;gap:7px;font-size:.6rem;text-transform:uppercase;letter-spacing:.14em;color:var(--ink2)}
  .ses-log input,.ses-log select{background:#000;border:1px solid var(--line);border-radius:8px;color:var(--ink);font-family:var(--sans);font-size:.94rem;padding:10px 12px;cursor:text;min-width:130px}
  .ses-log input:focus,.ses-log select:focus{outline:none;border-color:var(--accent)}
  /* community */
  .ann-grid{grid-template-columns:repeat(3,1fr)}
  @media(max-width:820px){.ann-grid{grid-template-columns:1fr}}
  .live-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#d6493f;margin-right:4px;animation:slpulse3 1.5s infinite}
  @keyframes slpulse3{0%,100%{opacity:1}50%{opacity:.35}}
  /* training */
  .training{display:flex;flex-direction:column;gap:18px}
  .bt-chart{background:#050507;border:1px solid var(--line);border-radius:12px;overflow:hidden;margin:4px 0 16px}
  .bt-svg{display:block;width:100%;height:auto}
  .bt-controls{display:flex;gap:10px;flex-wrap:wrap}
  .bt-controls .btn[disabled]{opacity:.35;pointer-events:none}
  /* progress */
  .progress2,.plan2,.payouts2,.invest2,.settings2{display:flex;flex-direction:column;gap:18px}
  .race-track.big{height:44px;margin-top:12px}
  .race-track.big .rc-run{width:36px;height:36px;font-size:.78rem}
  .prog-hero .race-zones{margin-top:14px}
  /* plan · 4-phase scaling map */
  .plan-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:820px){.plan-grid{grid-template-columns:1fr}}
  .plan-phase h3{font-family:var(--serif);font-weight:400;font-size:1.4rem;margin:10px 0 14px}
  .plan-phase.now{border-color:var(--accent);background:linear-gradient(180deg,rgba(61,134,207,.07),var(--bg1) 60%)}
  .plan-phase.done{opacity:.6}
  .pp-head{display:flex;justify-content:space-between;align-items:baseline;gap:12px}
  .pp-tag{font-size:.58rem;text-transform:uppercase;letter-spacing:.18em;color:var(--accent)}
  .pp-pay{font-family:var(--serif);font-size:1.15rem;color:var(--ink2);font-variant-numeric:tabular-nums}
  .pp-pay.acc{color:#35c46f}
  .pp-rows{display:flex;flex-direction:column}
  .pp-rows .fr{display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-top:1px solid rgba(244,241,234,.06);font-size:.86rem}
  .pp-rows .fr span{color:var(--ink2);font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;align-self:center}
  .pp-rows .fr b{font-weight:500;font-variant-numeric:tabular-nums;text-align:right}
  .model-card .model-in{display:flex;justify-content:space-between;gap:26px;align-items:center;flex-wrap:wrap}
  .model-h{font-family:var(--serif);font-size:1.25rem;margin-bottom:8px}
  .model-in .home-p{max-width:52ch;margin:0}
  .model-flow{display:flex;align-items:center;gap:10px;flex:none}
  .model-flow span{border:1px solid var(--accent);color:var(--accent);border-radius:999px;padding:8px 16px;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}
  .model-flow em{color:var(--ink2);font-style:normal}
  /* investments */
  .inv-top{display:flex;justify-content:space-between;align-items:flex-end;gap:18px;flex-wrap:wrap}
  .inv-bal{font-family:var(--serif);font-size:clamp(1.9rem,4vw,2.8rem);line-height:1;margin-top:6px;font-variant-numeric:tabular-nums}
  .inv-grid{display:grid;grid-template-columns:auto 1fr;gap:26px;align-items:center}
  @media(max-width:640px){.inv-grid{grid-template-columns:1fr;justify-items:center}}
  .donut{display:block}
  .dotc{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:8px;vertical-align:baseline}
  /* course · NorthPoint layout */
  .course-hero{display:flex;justify-content:space-between;align-items:center;gap:26px;margin-bottom:22px}
  .ch-h{font-family:var(--serif);font-weight:400;font-size:clamp(1.4rem,3vw,2rem);letter-spacing:-.01em;margin:4px 0 16px;max-width:26ch}
  .ch-l .course-prog{margin-bottom:18px;max-width:420px}
  .ch-r{position:relative;flex:none;display:grid;place-items:center}
  .ch-pct{position:absolute;font-family:var(--serif);font-size:1.5rem}
  @media(max-width:720px){.course-hero{flex-direction:column;align-items:flex-start}.ch-r{align-self:center}}
  .lesson-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:18px;align-items:start}
  @media(max-width:860px){.lesson-grid{grid-template-columns:1fr}}
  .les.active{background:rgba(61,134,207,.1);border-radius:8px}
  .video-cap{font-size:.68rem;color:var(--ink2);margin-top:10px;letter-spacing:.04em}
  .lesson-meta{display:flex;gap:12px;align-items:center;margin:18px 0 6px}
  .pill-mod{font-size:.58rem;text-transform:uppercase;letter-spacing:.14em;border:1px solid;border-radius:5px;padding:4px 9px}
  /* training · 1v1 battles */
  .battle-grid{display:grid;grid-template-columns:220px 1fr 1fr;gap:14px;align-items:stretch}
  @media(max-width:900px){.battle-grid{grid-template-columns:1fr}}
  .rank-card{display:flex;flex-direction:column;align-items:center;text-align:center;justify-content:center}
  .rk-elo{font-family:var(--serif);font-size:3rem;line-height:1;margin:10px 0 8px;font-variant-numeric:tabular-nums}
  .rk-sub{font-size:.66rem;text-transform:uppercase;letter-spacing:.14em;color:var(--ink2)}
  .searching{display:flex;align-items:center;gap:10px;font-size:.9rem;color:var(--ink1);margin:6px 0 4px}
  .lobby-code{font-family:var(--serif);font-size:2rem;letter-spacing:.14em;text-align:center;border:1px dashed var(--accent);color:var(--accent);border-radius:12px;padding:14px;margin:6px 0 14px;font-variant-numeric:tabular-nums}
  /* payouts · split calculator */
  .pout-hero{display:flex;align-items:baseline;gap:18px;flex-wrap:wrap;margin:6px 0 22px}
  .pout-l{font-size:.9rem;color:var(--ink1)}
  .pout-big{font-family:var(--serif);font-size:1.6rem}
  .pout-big input{background:none;border:none;border-bottom:1px solid var(--line);color:var(--ink);font-family:var(--serif);font-size:2rem;width:170px;padding:2px 6px;cursor:text;font-variant-numeric:tabular-nums}
  .pout-big input:focus{outline:none;border-bottom-color:var(--accent)}
  .split-grid{display:grid;grid-template-columns:auto 1fr;gap:26px;align-items:center;margin-bottom:18px}
  @media(max-width:640px){.split-grid{grid-template-columns:1fr;justify-items:center}}
  .sp-ctl{display:flex;align-items:center;gap:6px;font-variant-numeric:tabular-nums}
  .sp-pct{width:46px;background:none;border:none;border-bottom:1px dashed var(--line);color:var(--ink);font-family:var(--sans);font-size:.9rem;text-align:right;padding:1px 2px;cursor:text}
  .sp-pct:focus{outline:none;border-bottom-color:var(--accent)}
  .sp-pct::-webkit-outer-spin-button,.sp-pct::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .sp-amt{min-width:74px;text-align:right;font-weight:600}
  /* SIM / practice mode */

      <circle cx="1050" cy="240" r="13" fill="#3d86cf" stroke="none" opacity=".6"/>
    </g>
  </svg>
  <div class="grain"></div>

  <aside class="sidebar" id="sidebar"></aside>

  <div class="shell">
    <header class="topbar" id="topbar">
      <div class="tb-left"><button class="tb-menu" data-a="togglenav" aria-label="Menu">☰</button></div>
      <div class="tb-right"><span class="mkt" id="mkt"><i></i> Market open</span><span id="clock">--:--:--</span></div>
    </header>
    <section id="panel" class="content"></section>
  </div>


<script>
(function(){
  "use strict";
  const $=s=>document.querySelector(s);
  const body=document.body;
  const KEY="candado_state_v1", VKEY="candado_voz", HKEY="candado_historial", PKEY="candado_progress";
  const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const DOW=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const SETUPS_L={orb:"ORB",killzone:"Killzone",smc:"SMC",emas:"EMAs",breakout:"Breakout",rev:"Reversal",otro:"Other"};
  const EMO_L={disciplina:"Disciplined",paciencia:"Patient",neutral:"Neutral",fomo:"FOMO",revancha:"Revenge",ansioso:"Anxious"};

  const hoy=()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");};
  const hhmm=()=>{const d=new Date();return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");};
  const longDate=()=>{const d=new Date();return MONTHS[d.getMonth()]+" "+d.getDate()+", "+d.getFullYear();};

  let S=cargar();
  function cargar(){
    let s=null; try{s=JSON.parse(localStorage.getItem(KEY));}catch(e){}
    if(!s||s.fecha!==hoy()){ s={fecha:hoy(),estado:"BRIEFING",cuenta:(s&&s.cuenta)||null,plan:"",revenges:0,log:[]}; guardar(s); }
    if(s.revenges==null)s.revenges=0;
    return s;
  }
  function guardar(s){s=s||S;try{localStorage.setItem(KEY,JSON.stringify(s));}catch(e){}}
  function bitacora(m){S.log.unshift({t:hhmm(),m});if(S.log.length>6)S.log.pop();guardar();pintarLog();}

  function histLoad(){try{return JSON.parse(localStorage.getItem(HKEY))||[];}catch(e){return[];}}
  function histSave(h){try{localStorage.setItem(HKEY,JSON.stringify(h));}catch(e){}}
  function registrar(outcome){
    const h=histLoad(), rec={fecha:S.fecha,outcome,revenges:S.revenges||0,durMin:S.durMin||null,pnl:(S.pnl==null?null:S.pnl),setup:S.setup||null,emotion:S.emotion||null,notes:S.notes||""};
    const prev=h.find(x=>x.fecha===S.fecha);
    if(prev)Object.assign(prev,rec); else h.unshift(rec);
    if(h.length>90)h.pop(); histSave(h);
  }
  function stats(){
    const h=histLoad();
    const g=h.filter(x=>x.outcome==="GANADA").length, b=h.filter(x=>x.outcome==="BLOQUEADO").length, tot=g+b;
    let racha=0; for(const x of h){ if((x.revenges||0)===0)racha++; else break; }
    return {h,g,b,tot,wr:tot?Math.round(g/tot*100):0,racha};
  }
  function durTrade(){ return S.tEntrada? Math.max(1,Math.round((Date.now()-S.tEntrada)/60000)) : 0; }
  function within(f,days){const p=(f||"").split("-").map(Number);if(p.length<3)return false;const d=new Date(p[0],p[1]-1,p[2]);return (new Date()-d)/86400000<=days;}
  function periodo(days){const h=histLoad().filter(x=>within(x.fecha,days));
    const g=h.filter(x=>x.outcome==="GANADA").length;
    const disc=h.length?Math.round(h.filter(x=>(x.revenges||0)===0).length/h.length*100):0;
    const pnl=h.reduce((a,x)=>a+(x.pnl||0),0);
    return {n:h.length,g,disc,pnl};}
  function insight(){const h=histLoad();if(!h.length)return "No data yet. Today: wait only for your A+, one bullet.";
    const rev=h.slice(0,10).reduce((a,x)=>a+(x.revenges||0),0);
    const recent=h.slice(0,6),blk=recent.filter(x=>x.outcome==="BLOQUEADO").length;
    if(rev>0)return "Your leak is revenge. After a loss, close the platform — no exceptions.";
    if(blk>=4)return "You keep losing the bullet. Be more selective: only A+, or don't shoot.";
    if(blk===0&&recent.length>=3)return "Clean streak. Don't size up on euphoria: same bullet.";
    return "You're disciplined. Protect the streak: one bullet, close cold.";}

  (function(){
    const g=$("#ticks"); if(!g)return; let h="";
    for(let i=0;i<60;i++){const a=(i/60)*Math.PI*2-Math.PI/2,r1=138,r2=i%5===0?128:133,
      x1=150+Math.cos(a)*r1,y1=150+Math.sin(a)*r1,x2=150+Math.cos(a)*r2,y2=150+Math.sin(a)*r2;
      h+=`<line class="tick" x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" opacity="${i%5===0?.5:.22}"></line>`;}
    g.innerHTML=h;
  })();

  /* ---------- AUDIO ---------- */
  let ac=null;
  function beep(f,dur,delay,vol){try{ac=ac||new(window.AudioContext||window.webkitAudioContext)();if(ac.state==="suspended")ac.resume();
    const o=ac.createOscillator(),g=ac.createGain(),t=ac.currentTime+(delay||0);o.type="triangle";o.frequency.value=f;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol||.14,t+.02);g.gain.exponentialRampToValueAtTime(.0001,t+(dur||.2));
    o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+(dur||.2)+.02);}catch(e){}}
  function sirena(){beep(760,.17,0,.16);beep(560,.17,.21,.16);beep(760,.17,.42,.16);}

  const MASC=["Daniel","Alex","Aaron","Tom","Oliver","Arthur","Reed","Rocko","Fred"];
  let vozPref=localStorage.getItem(VKEY)||null,vozSel=null,voices=[];
  function pickMasc(l){for(const n of MASC){const v=l.find(x=>x.name.includes(n));if(v)return v;}return null;}
  function cargarVoces(){
    if(!("speechSynthesis" in window))return;
    const vs=speechSynthesis.getVoices(); voices=vs.filter(v=>/^en/i.test(v.lang));
    const gb=voices.filter(v=>/en-GB/i.test(v.lang));
    vozSel=(vozPref&&voices.find(v=>v.name===vozPref))||pickMasc(gb)||pickMasc(voices)||gb[0]||voices[0]||null;
    pintarSelectorVoz();
  }
  if("speechSynthesis" in window){cargarVoces();speechSynthesis.onvoiceschanged=cargarVoces;}
  function hablar(txt){
    if(!("speechSynthesis" in window))return;
    try{speechSynthesis.cancel();}catch(e){}
    const frases=txt.match(/[^.,;:!?]+[.,;:!?]*/g)||[txt];
    frases.forEach(fr=>{const t=fr.trim();if(!t)return;const u=new SpeechSynthesisUtterance(t);
      if(vozSel)u.voice=vozSel;u.lang=(vozSel&&vozSel.lang)||"en-US";u.rate=0.94;u.pitch=0.92;u.volume=1;
      try{speechSynthesis.speak(u);}catch(e){}});
  }
  function pintarSelectorVoz(){const sel=$("#vozSel");if(!sel)return;
    if(!voices.length){sel.innerHTML="<option>system</option>";return;}
    sel.innerHTML=voices.map(v=>`<option value="${v.name}"${vozSel&&v.name===vozSel.name?" selected":""}>${v.name.replace(/\s*\(.*\)/,"")}</option>`).join("");}

  let alarmaTimer=null,silenciado=false;
  function iniciarAlarma(){silenciado=false;disparar();clearInterval(alarmaTimer);
    alarmaTimer=setInterval(()=>{if(!silenciado&&S.estado==="BLOQUEADO")disparar();},13000);}
  function disparar(){sirena();hablar("Sir. You've lost your only bullet. I recommend closing the platform immediately. Come back tomorrow, cold. Today is not your day.");}
  function pararAlarma(){silenciado=true;clearInterval(alarmaTimer);try{speechSynthesis.cancel();}catch(e){}}

  /* ---------- transitions ---------- */
  let parteHablada=false;
  function armar(){
    S.estado="ARMADO";bitacora("Chamber loaded · 1 bullet");guardar();render();beep(500,.1,0,.12);
    if(!parteHablada)speakBriefing();}
  function tomarTrade(){if(S.estado!=="ARMADO"){revancha();return;}
    S.estado="EN_TRADE";S.tEntrada=Date.now();S.durMin=null;S.pnl=null;S.setup=null;S.emotion=null;S.notes="";bitacora("Bullet fired · trade open");guardar();render();
    beep(520,.13,0,.13);hablar("Bullet's in the air, sir. No net. Respect your plan and don't touch the stop.");}
  function ganar(){if(S.estado!=="EN_TRADE")return;
    S.durMin=durTrade();S.estado="GANADA";registrar("GANADA");bitacora("Won · "+S.durMin+"m · green session");guardar();render();
    beep(620,.14,0,.13);beep(830,.16,.16,.13);
    hablar(`Excellent execution, sir. A ${S.durMin}-minute trade, closed green. One bullet, one shot. Bank the win and give nothing back. You're done for today. Log your result below.`);}
  function perder(){if(S.estado!=="EN_TRADE")return;
    S.durMin=durTrade();S.estado="BLOQUEADO";registrar("BLOQUEADO");bitacora("Lost · "+S.durMin+"m · locked for the day");guardar();render();iniciarAlarma();}
  function revancha(){sirena();S.revenges=(S.revenges||0)+1;
    if(S.estado==="BLOQUEADO"){registrar("BLOQUEADO");hablar("Stop, sir. This is revenge. You have no bullets left. Close the platform.");}
    else {registrar("GANADA");hablar("Stop, sir. You already won your bullet. Don't give the profit back. You're done for today.");}
    bitacora("Revenge attempt · blocked");guardar();}
  function reset(){S={fecha:hoy(),estado:"ARMADO",cuenta:S.cuenta,plan:S.plan||"",revenges:0,log:[]};guardar();pararAlarma();render();}
  function newDay(){S={fecha:hoy(),estado:"BRIEFING",cuenta:S.cuenta,plan:"",revenges:0,log:[]};parteHablada=false;guardar();pararAlarma();render();}

  /* ---------- render ---------- */
  const VIS={
    ARMADO:{idx:"State 01 · the chamber",word:"Loaded",sub:"One single bullet in the chamber. One planned trade. When you take it, seal it here.",micro:"waiting for your A+ setup",ctr:"I",ctrl:"chamber"},
    EN_TRADE:{idx:"State 02 · bullet in the air",word:"In the air",sub:"The bullet is out. Now you just execute — respect the plan, don't touch the stop.",micro:"trade open · no net",ctr:"·",ctrl:"in flight"},
    GANADA:{idx:"State 03 · edition 1 / 1",word:"You won",sub:"One bullet, one shot. Bank the win and give nothing back. You're done for today.",micro:"session sealed green",ctr:"1/1",ctrl:"edition"},
    BLOQUEADO:{idx:"State 04 · empty chamber",word:"Locked",sub:"You lost your bullet. Close the platform. Come back tomorrow cold — today is not your day.",micro:"locked for the rest of the day",ctr:"0",ctrl:"empty"}
  };
  function render(){
    body.setAttribute("data-estado",S.estado);
    const dash=(S.estado==="BRIEFING"||S.estado==="GANADA"||S.estado==="BLOQUEADO");
    $("#brief").style.display=dash?"flex":"none";
    $("#instrument").style.display=dash?"none":"flex";
    pintarCuenta();pintarLog();
    if(S.estado==="BRIEFING"){renderBrief();return;}
    if(S.estado==="GANADA"||S.estado==="BLOQUEADO"){renderCierre();return;}
    const v=VIS[S.estado];
    $("#idx").textContent=v.idx;
    $("#state").innerHTML=v.word+'<em>.</em>';
    $("#sub").textContent=v.sub;
    $("#micro").textContent=v.micro;
    $("#ctr").textContent=v.ctr;
    document.querySelector(".ctr-l").textContent=v.ctrl;
    const b=(S.estado==="ARMADO")
      ? `<button class="btn fill" data-a="tomar" data-hover>I took my bullet</button>`
      : `<button class="btn fill" data-a="ganar" data-hover>Won</button><button class="btn danger" data-a="perder" data-hover>Lost</button>`;
    $("#acciones").innerHTML=b;
  }
  function pctTxt(){ return (S.cuenta>0&&S.pnl!=null)?((S.pnl>=0?"+":"")+(S.pnl/S.cuenta*100).toFixed(2)+"% of account"):""; }
  function histHTML(){ const last=stats().h.slice(0,5);
    return last.length
      ? last.map(x=>`<div class="hrow"><span class="hd">${x.fecha.slice(5).replace("-","/")}</span><span class="ho ${x.outcome==="GANADA"?"win":"blk"}">${x.outcome==="GANADA"?"Won":"Locked"}</span><span class="hr ${(x.revenges||0)?"":"ok"}">${(x.revenges||0)?x.revenges+" revenge":"discipline"}</span></div>`).join("")
      : `<div class="hempty">No sealed sessions yet. This is your first — may the log start clean.</div>`;
  }
  function setCoach(){ const wk=periodo(7),mo=periodo(31);
    $("#brief-week").textContent = wk.n? `${wk.n} sealed · ${wk.disc}% discipline${wk.pnl?` · ${wk.pnl>=0?"+":""}$${wk.pnl.toLocaleString("en-US")}`:""}` : "no sessions yet";
    $("#brief-month").textContent = mo.n? `${mo.n} sealed · ${mo.disc}% discipline${mo.pnl?` · ${mo.pnl>=0?"+":""}$${mo.pnl.toLocaleString("en-US")}`:""}` : "no sessions yet";
    $("#brief-improve").textContent = insight();
  }
  function renderCierre(){
    $("#col-objetivos").hidden=true; $("#col-resumen").hidden=false;
    $("#brief-listen").textContent="▶ Play the recap";
    const win=S.estado==="GANADA";
    $("#brief-eyebrow").textContent=`Session close · ${longDate()}`;
    $("#brief-hi").innerHTML=(win?"You won":"Locked")+'<em>.</em>';
    const st=stats();
    $("#st-tot").textContent=st.tot;
    $("#st-wr").textContent=st.tot?st.wr+"%":"—";
    $("#st-racha").textContent=st.racha;
    $("#brief-hist").innerHTML=histHTML();
    $("#cier-out").textContent=win?"Won · green":"Locked · red";
    $("#cier-dur").textContent=(S.durMin!=null)?S.durMin+" min":"—";
    const pin=$("#pnl"); if(pin&&document.activeElement!==pin)pin.value=(S.pnl!=null?S.pnl:"");
    const se=$("#setup"); if(se)se.value=S.setup||"";
    const em=$("#emotion"); if(em)em.value=S.emotion||"";
    const no=$("#notes"); if(no&&document.activeElement!==no)no.value=S.notes||"";
    $("#cier-pct").textContent=pctTxt()||"—";
    const rev=S.revenges||0;
    $("#cier-note").textContent=win
      ? "Clean shot. You took one bullet and banked it. Note what worked so tomorrow-you repeats it."
      : (rev>0
        ? "You lost the bullet and reached for revenge — that's the real leak. Close the platform now; the recap is done."
        : "The bullet missed, and you respected it by stopping. That's discipline, not failure. Write the one thing you'd change and come back cold.");
    const prof=totalProfit(), acc=acctLoad()||{evalTarget:1000}, tgt=acc.evalTarget||1000, toGo=Math.max(0,tgt-prof);
    const imp=$("#cier-impact"); if(imp)imp.innerHTML=
      `<div class="imp-row"><span>Discipline streak</span><b>${st.racha}${rev>0?" · reset":""}</b></div>`+
      `<div class="imp-row"><span>To your payout</span><b>${toGo>0?"$"+toGo.toLocaleString("en-US")+" left":"cleared ✓"}</b></div>`+
      `<div class="imp-row"><span>Logged to</span><b>Trades · Calendar · Coach</b></div>`;
    setCoach();
    $("#brief-foot").innerHTML=win
      ? `<button class="btn ghost" data-a="revancha" data-hover>I want another bullet</button><button class="btn" data-a="reset" data-hover>New session</button>`
      : `<button class="btn" data-a="silenciar" data-hover>Mute</button><button class="btn" id="override" data-hover><span class="fill-bar"></span>Hold 4s to override</button>`;
    if(!win)bindOverride();
  }
  function speakCierre(){
    const win=S.estado==="GANADA";
    let t=win?"Session closed green, sir. ":"Session locked, sir. ";
    if(S.durMin!=null)t+=`A ${S.durMin}-minute trade. `;
    if(S.pnl!=null){const pct=(S.cuenta>0)?`, ${S.pnl>=0?"up":"down"} ${Math.abs(S.pnl/S.cuenta*100).toFixed(1)} percent of the account`:"";
      t+=`Result: ${S.pnl>=0?"up":"down"} ${Math.abs(S.pnl)} dollars${pct}. `;}
    t+=win?"One bullet, one shot. Bank it and give nothing back. You're done for today."
          :"Close the platform and come back tomorrow, cold. Today is not your day.";
    hablar(t);
  }
  function escuchar(){ if(S.estado==="BRIEFING")speakBriefing(); else speakCierre(); }
  function renderBrief(){
    $("#col-objetivos").hidden=false; $("#col-resumen").hidden=true;
    $("#brief-listen").textContent="▶ Play the brief";
    $("#brief-foot").innerHTML=`<button class="btn fill" data-a="armar" data-hover>Load the chamber →</button>`;
    const st=stats(), h=new Date().getHours();
    const saludo=h<12?"Good morning":h<19?"Good afternoon":"Good evening";
    $("#brief-eyebrow").textContent=`Session brief · ${longDate()}`;
    $("#brief-hi").innerHTML=`${saludo}<em>.</em>`;
    $("#st-tot").textContent=st.tot;
    $("#st-wr").textContent=st.tot?st.wr+"%":"—";
    $("#st-racha").textContent=st.racha;
    $("#brief-hist").innerHTML=histHTML();
    $("#brief-riesgo").textContent=(S.cuenta>0)?"$"+Math.round(S.cuenta*.01).toLocaleString("en-US"):"set your account ↓";
    setCoach();
    const pl=$("#plan"); if(pl&&document.activeElement!==pl)pl.value=S.plan||"";
  }
  function speakBriefing(){
    parteHablada=true;
    const st=stats(), wk=periodo(7), h=new Date().getHours();
    const sal=h<12?"Good morning":h<19?"Good afternoon":"Good evening";
    let t=`${sal}, sir. Your session brief. `;
    t+= st.tot ? `You've sealed ${st.tot} ${st.tot===1?"session":"sessions"}, ${st.wr} percent green, and ${st.racha} in a row with discipline. ` : `First session: the log starts clean. `;
    if(wk.n) t+=`This week, ${wk.n} ${wk.n===1?"session":"sessions"}, ${wk.disc} percent with discipline. `;
    t+=`To improve: ${insight()} `;
    if(S.plan)t+=`Your plan for today: ${S.plan}. `;
    t+="Remember, sir: one single bullet. Zero revenge.";
    hablar(t);
  }
  function pintarLog(){const el=$("#ledger");if(!el)return;
    if(!S.log.length){el.innerHTML="";return;}
    el.innerHTML=`<div class="lt">Log · ${S.fecha}</div>`+S.log.map(e=>`<div><b>${e.t}</b>&nbsp;&nbsp;${e.m}</div>`).join("");}
  function pintarCuenta(){const i=$("#cuenta");if(S.cuenta&&document.activeElement!==i)i.value=S.cuenta;
    const b=$("#balaUsd");b.textContent=(S.cuenta>0)?"= $"+Math.round(S.cuenta*.01).toLocaleString("en-US"):"—";}

  function bindOverride(){
    const btn=$("#override");if(!btn)return;const bar=btn.querySelector(".fill-bar");
    let raf=null,t0=null;const dur=4000;
    const step=()=>{const p=Math.min(1,(performance.now()-t0)/dur);bar.style.width=(p*100)+"%";
      if(p>=1){stop();reset();return;}raf=requestAnimationFrame(step);};
    const start=()=>{t0=performance.now();raf=requestAnimationFrame(step);};
    const stop=()=>{cancelAnimationFrame(raf);bar.style.width="0%";t0=null;};
    btn.addEventListener("mousedown",start);btn.addEventListener("mouseup",stop);btn.addEventListener("mouseleave",stop);
    btn.addEventListener("touchstart",e=>{e.preventDefault();start();});btn.addEventListener("touchend",stop);
  }

  /* ---------- events ---------- */
  document.addEventListener("click",e=>{
    const b=e.target.closest("button[data-a]");if(!b)return;
    ({sign:firmar,logpayout:logPayout,togglenav:toggleNav,addacct:addAccount,startsession:startSession,endsession:endSession,newsession:newSession,fire:fireBullet,won:wonSession,lost:lostSession,addinvest:addInvest,replayonb:startOnb,findmatch:battleFind,createlobby:battleLobby,practicenow:practiceNow,logout:()=>{if(confirm("Log out? Your journal stays on this device."))(localStorage.removeItem("candado_user"),location.reload());}}[b.dataset.a]||function(){})();
  });
  document.addEventListener("input",e=>{ if(!e.target)return;
    if(ONB&&e.target.id&&e.target.id.startsWith("onb-")){ const d=ONB.data, id=e.target.id, v=e.target.value;
      if(id==="onb-handle")d.handle=v; else if(id==="onb-why")d.why=v;
      else{const n=parseFloat(v); if(!isNaN(n)&&n>0){ if(id==="onb-size")d.size=n; else if(id==="onb-target")d.target=n; else if(id==="onb-trades")d.trades=Math.round(n); else if(id==="onb-risk")d.risk=n; else if(id==="onb-sess")d.sess=n; else if(id==="onb-ptarget")d.ptarget=n; }}
      return;}
    if(e.target.id==="cap-aporte"||e.target.id==="cap-tasa"||e.target.id==="cap-meta"){capCalc();}
    else if(e.target.id==="pout-amount"){splitCalc();}
    else if(e.target.className==="sp-pct"){splitSave(SPLIT_DEF.map((_,i)=>parseFloat(($("#sp-"+i)||{}).value)||0));splitCalc();}
    else if(e.target.id==="pf-handle"){const p=profileLoad();p.handle=e.target.value;profileSave(p);
      const av=document.querySelector(".pc-av,.tb-av");if(av)av.textContent=(e.target.value.trim()[0]||"T").toUpperCase();
      const nm=document.querySelector(".sb-pinfo b");if(nm)nm.textContent=e.target.value.trim()||"trader";}
    else if(e.target.id==="rul-trades"||e.target.id==="rul-risk"||e.target.id==="rul-sess"||e.target.id==="rul-target"){
      const r=rulesLoad(), v=parseFloat(e.target.value);
      if(!isNaN(v)&&v>0){ if(e.target.id==="rul-trades")r.trades=Math.round(v); else if(e.target.id==="rul-risk")r.risk=v; else if(e.target.id==="rul-sess")r.sess=v; else r.target=v; rulesSave(r); }}
    else if(e.target.id==="ses-pnl"){const v=parseFloat(e.target.value);sessRecord({pnl:isNaN(v)?null:v});}
    else if(e.target.id==="ses-notes"){sessRecord({notes:e.target.value});}
    else if(e.target.id==="acct-why"||e.target.id==="acct-firm"||e.target.id==="acct-size"||e.target.id==="acct-target"){
      const a=acctLoad()||{firm:"Tradeify",size:50000,evalTarget:1000,why:""};
      if(e.target.id==="acct-why")a.why=e.target.value;
      else if(e.target.id==="acct-firm")a.firm=e.target.value;
      else if(e.target.id==="acct-size")a.size=parseFloat(e.target.value)||0;

    const ad=e.target.closest("[data-acdel]"); if(ad){const a=acctsLoad()||[];a.splice(+ad.dataset.acdel,1);acctsSave(a);mostrar("cuentas");return;}
    const cb=e.target.closest("[data-cal]"); if(cb){ let [y,m]=calMonth.split("-").map(Number); m+=(+cb.dataset.cal); if(m<1){m=12;y--;} if(m>12){m=1;y++;} calMonth=y+"-"+String(m).padStart(2,"0"); mostrar(vistaActual); } });

  /* ---------- Access gate · invite-only sign in / create account ---------- */
  function userLoad(){try{return JSON.parse(localStorage.getItem("candado_user"))||null;}catch(e){return null;}}
  function userSave(u){try{localStorage.setItem("candado_user",JSON.stringify(u));}catch(e){}}
  function codeHash(s){let h=5381;s=String(s||"").toUpperCase().replace(/\s+/g,"");for(let i=0;i<s.length;i++){h=((h<<5)+h+s.charCodeAt(i))>>>0;}return h.toString(36);}
  /* prueba de 7 días · los amigos con código propio quedan exentos (gratis para siempre) */
  const TRIAL_DAYS=7;
  const FRIENDS=["rz5ko4","1r9vkdg","1r9ieay","1ra0zcf","1r9gm6n","1ra65wt","1r9x27u","1r9gxgn","1r9v4ie","1ra0zek","1r9d6uv","1ra4go1","1r9g4t0","1ra09ai","1r9tyi9","1r9q97n"];
  const WA="https://wa.me/524434405815?text="+encodeURIComponent("Hola André, terminó mi prueba de SPOTTER AI y quiero el acceso completo.");
  function isFriend(){const u=userLoad();return !!(u&&FRIENDS.includes(codeHash(u.code)));}
  function trialStart(){let t=+localStorage.getItem("candado_trial")||0;if(!t){t=Date.now();try{localStorage.setItem("candado_trial",String(t));}catch(e){}}return t;}
  function trialLeft(){return Math.max(0,TRIAL_DAYS-Math.floor((Date.now()-trialStart())/86400000));}
  function trialOver(){return userLoad()&&!isFriend()&&trialLeft()<=0;}
  function renderTrialEnded(){
    if(!document.getElementById("gate")){const d=document.createElement("div");d.id="gate";document.body.appendChild(d);}
    const g=document.getElementById("gate"); if(!g)return;
    g.innerHTML=`<div class="onb-bg"></div><div class="onb-card">
      <div class="onb-brand"><svg viewBox="0 0 32 32" class="brand-mark" aria-hidden="true"><g class="spin"><circle cx="16" cy="16" r="12.6" fill="none" stroke="currentColor" stroke-width="1.4" opacity=".4"/><path d="M16 3.4v4.4M16 24.2v4.4M3.4 16h4.4M24.2 16h4.4" stroke="currentColor" stroke-width="1.4" opacity=".4" stroke-linecap="round"/></g><circle class="lock" cx="16" cy="16" r="5.4" fill="none" stroke="var(--accent)" stroke-width="1.35"/><circle cx="16" cy="16" r="2.2" fill="var(--accent)"/></svg>SPOTTER <i>AI</i></div>
      <h1 class="onb-h">Tu prueba<br><em>terminó.</em></h1>
      <p class="onb-p">Fueron <b>7 días de SPOTTER AI</b>, gratis. Para seguir con el mentor en vivo, la comunidad y el paquete completo, desbloquea tu acceso:</p>
      <div class="gate-form">
        <a class="btn fill lg" href="${WA}" target="_blank" rel="noopener" data-hover>Desbloquear por WhatsApp →</a>
        <a class="onb-skip" href="landing.html" data-hover>ver el plan completo</a>
      </div>
    </div>`;
  }
  const ACCESS=["rt2j71","rz5ko4","1r9vkdg","1r9ieay","1ra0zcf","1r9gm6n","1ra65wt","1r9x27u","1r9gxgn","1r9v4ie","1ra0zek","1r9d6uv","1ra4go1","1r9g4t0","1ra09ai","1r9tyi9","1r9q97n"];
  function startGate(){
    if(!document.getElementById("gate")){const d=document.createElement("div");d.id="gate";document.body.appendChild(d);}
    renderGate();
  }
  function renderGate(err){
    const g=document.getElementById("gate"); if(!g)return;
    g.innerHTML=`<div class="onb-bg"></div><div class="onb-card">
      <div class="onb-brand"><svg viewBox="0 0 32 32" class="brand-mark" aria-hidden="true"><g class="spin"><circle cx="16" cy="16" r="12.6" fill="none" stroke="currentColor" stroke-width="1.4" opacity=".4"/><path d="M16 3.4v4.4M16 24.2v4.4M3.4 16h4.4M24.2 16h4.4" stroke="currentColor" stroke-width="1.4" opacity=".4" stroke-linecap="round"/></g><circle class="lock" cx="16" cy="16" r="5.4" fill="none" stroke="var(--accent)" stroke-width="1.35"/><circle cx="16" cy="16" r="2.2" fill="var(--accent)"/></svg>SPOTTER <i>AI</i></div>
      <h1 class="onb-h">From zero<br>to <em>payout.</em></h1>
      <p class="onb-p">Invite-only. The platform is <b>free for invited traders</b> — your AI spotter runs on your own Claude.</p>
      <div class="gate-form">
        <input id="gate-handle" class="onb-big gate-inp" placeholder="your name" autocomplete="off">
        <input id="gate-code" class="onb-big gate-inp code ${err?"err":""}" placeholder="invite code" autocomplete="off">
        ${err?`<div class="gate-err">${err}</div>`:""}
        <button class="btn fill lg" data-gate="enter" data-hover>Enter the platform →</button>
      </div>
      <a class="onb-skip" href="landing.html" data-hover>don't have a code? get access</a>
    </div>`;
    const f=g.querySelector("#gate-handle"); if(f)f.focus();
  }
  function enterGate(){
    const g=document.getElementById("gate"); if(!g)return;
    const name=(g.querySelector("#gate-handle")?.value||"").trim();
    const code=(g.querySelector("#gate-code")?.value||"").trim();
    if(!name){renderGate("Put your name first — it's your handle on the race.");g.querySelector("#gate-handle").focus();return;}
    if(!ACCESS.includes(codeHash(code))){renderGate("That code isn't on the list. Check it with André.");const c=g.querySelector("#gate-code");c.focus();return;}
    userSave({handle:name,code:code.toUpperCase(),at:Date.now()});
    const p=profileLoad(); p.handle=name; profileSave(p);
    g.remove(); renderSidebar();
    if(!localStorage.getItem("candado_onboarded")) startOnb(); else mostrar("home");
  }
  document.addEventListener("keydown",e=>{ if(e.key==="Enter"&&document.getElementById("gate"))enterGate(); });
  /* ---------- Onboarding · new-user experience ---------- */
  let ONB=null;
  const ONB_STEPS=["Welcome","Profile","Account","Rules","Your why","Communities","Done"];
  function startOnb(){
    const p=profileLoad(), a=acctLoad()||{}, r=rulesLoad();
    ONB={step:0,data:{handle:p.handle||"",firm:a.firm||"Tradeify",size:a.size||50000,target:a.evalTarget||1000,exp:"new",
      trades:r.trades,risk:r.risk,sess:r.sess,ptarget:r.target,why:a.why||"",
      comms:Object.assign({discord:false,live:false,battles:false,news:false},p.communities||{})}};
    if(!document.getElementById("onb")){const d=document.createElement("div");d.id="onb";document.body.appendChild(d);}
    renderOnb();
  }
  function finishOnb(){
    const d=ONB.data;
    const p=profileLoad(); p.handle=(d.handle||"trader").trim()||"trader"; p.communities=d.comms; profileSave(p);
    acctSave({firm:d.firm||"Tradeify",size:d.size||50000,evalTarget:d.target||1000,why:d.why||""});
    rulesSave({trades:d.trades||1,risk:d.risk||1,sess:d.sess||1.5,target:d.ptarget||2});
    try{localStorage.setItem("candado_onboarded","1");}catch(e){}
    ONB=null; const o=document.getElementById("onb"); if(o)o.remove();
    renderSidebar(); mostrar("home");
  }
  function onbPill(list,cur,attr){ return list.map(x=>`<button class="onb-pill ${x[0]===cur?"on":""}" data-${attr}="${x[0]}" data-hover>${x[1]}</button>`).join(""); }
  function renderOnb(){
    const o=document.getElementById("onb"); if(!o||!ONB)return;
    const d=ONB.data, s=ONB.step, last=ONB_STEPS.length-1;
    const prog=`<div class="onb-prog">${ONB_STEPS.map((_,i)=>`<span class="${i<=s?"on":""}"></span>`).join("")}</div>`;
    let body="";
    if(s===0) body=`<div class="onb-brand"><svg viewBox="0 0 32 32" class="brand-mark" aria-hidden="true"><g class="spin"><circle cx="16" cy="16" r="12.6" fill="none" stroke="currentColor" stroke-width="1.4" opacity=".4"/><path d="M16 3.4v4.4M16 24.2v4.4M3.4 16h4.4M24.2 16h4.4" stroke="currentColor" stroke-width="1.4" opacity=".4" stroke-linecap="round"/></g><circle class="lock" cx="16" cy="16" r="5.4" fill="none" stroke="var(--accent)" stroke-width="1.35"/><circle cx="16" cy="16" r="2.2" fill="var(--accent)"/></svg>SPOTTER <i>AI</i></div>
      <h1 class="onb-h">From zero<br>to <em>payout.</em></h1>
      <p class="onb-p">Two minutes to set up your platform — your profile, your rules, your room. Everything stays yours and editable.</p>
      <button class="btn fill lg" data-onb="next" data-hover>Start →</button>`;
    else if(s===1) body=`<div class="onb-k">Profile</div><h2 class="onb-h2">What do we call you?</h2>
      <input id="onb-handle" class="onb-big" placeholder="your handle" value="${esc(d.handle)}" autocomplete="off">
      <p class="onb-p">This is your name on the race, the leaderboards and your profile card.</p>`;
    else if(s===2) body=`<div class="onb-k">Your account</div><h2 class="onb-h2">Where are you trading?</h2>
      <div class="onb-row">${onbPill([["Tradeify","Tradeify"],["Apex","Apex"],["Lucid","Lucid"],["Other","Other"]],d.firm,"onbfirm")}</div>
      <div class="onb-fields">
        <label>Account size $<input id="onb-size" type="number" value="${d.size}"></label>
        <label>Eval target $<input id="onb-target" type="number" value="${d.target}"></label>
      </div>
      <div class="onb-k" style="margin-top:26px">Experience</div>
      <div class="onb-row">${onbPill([["new","Brand new"],["some","Some experience"],["funded","Already funded"]],d.exp,"onbexp")}</div>`;
    else if(s===3) body=`<div class="onb-k">Session rules</div><h2 class="onb-h2">Your rules. Set them cold.</h2>
      <div class="ses-rules onb-rules">
        <div class="sr-rule"><span>Max trades</span><b><input class="rul-inp" id="onb-trades" type="number" min="1" value="${d.trades}"></b></div>
        <div class="sr-rule"><span>Risk / trade</span><b><input class="rul-inp" id="onb-risk" type="number" step="0.1" value="${d.risk}">%</b></div>
        <div class="sr-rule"><span>Session risk</span><b><input class="rul-inp" id="onb-sess" type="number" step="0.1" value="${d.sess}">%</b></div>
        <div class="sr-rule"><span>Profit target</span><b class="up">+<input class="rul-inp" id="onb-ptarget" type="number" step="0.1" value="${d.ptarget}">%</b></div>
      </div>
      <p class="onb-p">We recommend one bullet — one planned trade a session. You can change these any time before a session.</p>`;
    else if(s===4) body=`<div class="onb-k">Your why</div><h2 class="onb-h2">What does your first payout buy?</h2>
      <textarea id="onb-why" class="home-editor onb-why" placeholder="your apartment, your car, your freedom…">${esc(d.why)}</textarea>
      <p class="onb-p">When you're red and tempted, logic won't stop you — your reason will.</p>`;
    else if(s===5){ const C=d.comms;
      const card=(k,t,sub)=>`<button class="onb-comm ${C[k]?"on":""}" data-onbcomm="${k}" data-hover><span class="oc-check">${C[k]?"✓":""}</span><div><b>${t}</b><p>${sub}</p></div></button>`;
      body=`<div class="onb-k">Communities</div><h2 class="onb-h2">Join the room.</h2>
      <p class="onb-p" style="margin-top:0">Pick what you want in — <b>nothing is automatic</b>. You can join or leave any time.</p>
      <div class="onb-comms">
        ${card("discord","SPOTTER AI Discord","The main room — daily bias, payouts, the crew")}
        ${card("live","Live NY sessions","Trade the open together every morning")}
        ${card("battles","1v1 battles","Same replay, best P&L wins — Elo on the line")}
        ${card("news","Announcements & daily bias","The tape brief, every morning")}
      </div>
      <a class="btn accent" href="${DISCORD}" target="_blank" rel="noopener" data-hover>Join the Discord now →</a>`; }
    else body=`<div class="onb-brand sm">SPOTTER <i>AI</i></div>
      <h2 class="onb-h2">You're set, <em>${esc((d.handle||"trader").trim()||"trader")}.</em></h2>
      <div class="onb-sum">
        <div class="alloc-row"><span>Account</span><b>${esc(d.firm)} · $${(d.size||0).toLocaleString("en-US")}</b></div>
        <div class="alloc-row"><span>Eval target</span><b>$${(d.target||0).toLocaleString("en-US")}</b></div>
        <div class="alloc-row"><span>Rules</span><b>${d.trades} bullet · ${d.risk}% / ${d.sess}% · +${d.ptarget}%</b></div>
        <div class="alloc-row"><span>Communities</span><b>${Object.values(d.comms).filter(Boolean).length?Object.values(d.comms).filter(Boolean).length+" joined":"none — join any time"}</b></div>
      </div>
      <p class="onb-p">The chamber is loaded. See you at the New York open.</p>
      <button class="btn fill lg" data-onb="finish" data-hover>Enter the platform →</button>`;
    o.innerHTML=`<div class="onb-bg"></div><div class="onb-card">${prog}${body}
      ${s>0&&s<last?`<div class="onb-nav">
        <button class="btn ghost" data-onb="back" data-hover>← Back</button>
        <button class="btn fill" data-onb="next" data-hover>Continue →</button>
      </div>`:""}
      ${s===0?`<button class="onb-skip" data-onb="finish" data-hover>skip setup</button>`:""}</div>`;
    const fi=o.querySelector("#onb-handle,#onb-why"); if(fi)fi.focus();
  }

  /* start */
  document.body.classList.add("data-view-open");
  renderSidebar();
  mostrar("home");
  if(localStorage.getItem("candado_demo")){ // retira cualquier data de prueba vieja
    localStorage.removeItem("candado_historial");localStorage.removeItem("candado_demo"); }
  if(userLoad()&&!isFriend()) trialStart(); // arranca el reloj de 7 días para usuarios de prueba
  if(!userLoad()) startGate();
  else if(!localStorage.getItem("candado_onboarded")) startOnb();
  else if(trialOver()) renderTrialEnded();
})();
</script>
</body>
</html>
